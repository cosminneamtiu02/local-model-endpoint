# Dependabot configuration for the LIP project.
#
# Scope: pip × 2 (apps/backend + packages/error-contracts) plus
# github-actions. The npm × 2 ecosystems and the terraform ecosystem
# were stripped during project-bootstrap with the rest of the frontend
# and IaC tooling.
#
# Groups batch interlocking package updates into atomic PRs:
# - fastapi-stack: fastapi + starlette + uvicorn share ASGI contract
#   versions; the explicit-transitive subset httptools/uvloop/watchfiles
#   (pinned individually instead of via ``uvicorn[standard]`` per the
#   apps/backend/pyproject.toml comment) rides in the same group so a
#   uvicorn bump and its companion transitives land atomically.
# - pydantic: pydantic + pydantic-settings release in lockstep, with
#   pydantic-settings's range pinned against pydantic's minor.
# - pytest: pytest + plugins ship aligned releases; mismatched plugins
#   cause first-CI-run failures after a pytest bump.
# - dev-tools: ruff + pyright + import-linter + schemathesis frequently
#   bump together; grouping prevents cascading manifest conflicts.
#
# See docs/automerge.md for the wider auto-merge architecture this
# pairs with, and docs/decisions.md ADR-010 for the manual-Squash-button
# exception that auto-merges Dependabot PRs only.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/apps/backend"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      # ``update-types`` filters intentionally omitted from every group
      # below so MAJOR bumps also stay grouped — mirrors the
      # ``github-actions-stack`` policy (no filter ⇒ all update types
      # ride together). Without this, a major bump in one ecosystem PR
      # could land in isolation while its sibling minor/patch PR moves
      # in a separate group, re-opening the cascade-conflict surface
      # that the grouping is here to close.
      pydantic:
        patterns:
          - "pydantic"
          - "pydantic-settings"
      pytest:
        patterns:
          - "pytest"
          - "pytest-*"
      fastapi-stack:
        patterns:
          - "fastapi"
          - "starlette"
          - "uvicorn*"
          # uvicorn[standard]'s explicit-transitive subset — pinned in
          # apps/backend/pyproject.toml so Dependabot can scan them. List
          # them on the same group so a uvicorn sync-minor bump rides
          # the same PR as its companions instead of opening four solos.
          - "httptools"
          - "uvloop"
          - "watchfiles"
      dev-tools:
        patterns:
          - "ruff"
          - "pyright"
          - "import-linter"
          - "pip-audit"
          - "types-*"
          # ``pyyaml`` (runtime peer of types-pyyaml) co-grouped so a
          # stub-vs-runtime version drift cannot land across two PRs.
          - "pyyaml"
          # ``hatchling`` is the build-system requirement pinned in
          # ``[build-system].requires`` of ``apps/backend/pyproject.toml``.
          # Grouped under dev-tools (rather than runtime-singletons)
          # because it is build-time toolchain — same policy class as
          # ruff/pyright. Without this entry a hatchling bump opens a
          # solo PR and consumes a slot under
          # ``open-pull-requests-limit: 5``, re-opening the
          # adjacent-line cascade-conflict surface in
          # ``pyproject.toml`` that the existing groups close.
          # Note: hatchling is build-system only and never enters
          # ``uv.lock`` — Dependabot's manifest scan of
          # ``[build-system].requires`` is the single source of truth
          # for drift on this pin.
          - "hatchling"
          # FORWARD: when LIP-E001-F002 lands and pins schemathesis (per
          # ADR-011), add `schemathesis*` here in the same PR so its 22
          # transitives ride with ruff/pyright instead of opening solo.
      runtime-singletons:
        # Single-publisher runtime deps that have no cascade-conflict
        # risk (no peers releasing in lockstep) but ship frequently
        # enough to crowd the PR queue against the documented
        # ``open-pull-requests-limit: 5``. Grouping them prevents a busy
        # release week from saturating the limit and starving the
        # genuinely-grouped fastapi-stack / pydantic / pytest PRs.
        patterns:
          - "structlog"
          - "httpx"

  - package-ecosystem: "pip"
    directory: "/packages/error-contracts"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      # ``update-types`` filters intentionally omitted — major bumps stay grouped.
      pytest:
        patterns:
          - "pytest"
          - "pytest-*"
      # ``import-linter`` intentionally excluded — this workspace has no
      # linter config. If a future addition lands import-linter here
      # (e.g. when codegen invariants warrant their own contracts),
      # add ``import-linter`` to this group in lockstep with the
      # backend's ``dev-tools`` group entry. ``pip-audit`` co-grouped
      # with ruff/pyright now that this workspace also runs
      # ``task check:audit:errors`` (mirrors the backend group), so a
      # pip-audit bump rides the same PR as sibling dev-tool bumps
      # rather than opening solo.
      dev-tools:
        patterns:
          - "ruff"
          - "pyright"
          - "pip-audit"
          # ``pyyaml`` is the workspace's runtime dep but ships often enough
          # that a solo bump can cascade-conflict with sibling dev-tool PRs
          # on adjacent lines of pyproject.toml. Co-grouping mirrors the
          # backend's ``dev-tools`` group rationale (lane 10.1).
          - "pyyaml"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      # Group every action publisher we depend on so adjacent-line bumps
      # in one workflow YAML don't cascade-conflict (see
      # TEMPLATE_FRICTION.md "Dependabot rebase cascade").
      github-actions-stack:
        patterns:
          - "actions/*"
          - "astral-sh/*"
          - "arduino/*"
        # No ``update-types`` filter: action majors are infrequent but
        # arrive ungrouped if filtered, which would re-open the
        # cascade-conflict surface this group is here to close.

  # Pre-commit hooks pin upstream by `rev:` SHA; without this ecosystem
  # entry the pinned versions silently age out (ruff and detect-secrets
  # both ship security-relevant fixes that the project would miss).
  - package-ecosystem: "pre-commit"
    directory: "/"
    target-branch: "main"
    # Daily + group=all + small open-PR limit: ruff-pre-commit ships point
    # releases between weekly Dependabot runs, so the daily cadence keeps
    # the local hook from fighting the manifest version. The grouped PR
    # is typically the only open pre-commit PR; the limit is set to 1 so
    # a stale (waiting-on-review) PR cannot double up alongside the next
    # day's regrouping — capping at 2 would let pre-commit silently
    # consume two slots against the weekly limit while older PRs sit.
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      # ``update-types`` filter intentionally omitted — major bumps stay
      # grouped. Bare ``"*"`` glob covers every Dependabot-resolved
      # pre-commit hook URL form. If a future Dependabot regression
      # re-opens the cascade-conflict surface (PR #20/#21-shaped bug),
      # re-add explicit URL forms here as belt-and-braces — the
      # load-bearing context lives in TEMPLATE_FRICTION.md.
      pre-commit-tools:
        patterns:
          - "*"
