name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/backend/uv.lock

      - name: Set up Python
        run: uv python install 3.13.3

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        working-directory: .
        run: task check:lint

      - name: Format check
        working-directory: .
        run: task check:format

      - name: Type check
        working-directory: .
        run: task check:types

      - name: Architecture check
        working-directory: .
        run: task check:arch

      - name: Tests (unit + integration + contract)
        working-directory: .
        run: task check:test

      # Lockfile freshness: a manifest change without a corresponding
      # ``uv lock`` regen would slip past the local-only ``task check``
      # otherwise. Symmetric with the ``error-contracts`` job's
      # ``check:errors`` gate. ``check:plist`` is intentionally omitted
      # — it is darwin-only (validates the launchd plist with ``plutil``)
      # and the runner is ``ubuntu-latest``.
      - name: Lockfile freshness check
        working-directory: .
        run: task check:lockfile

  error-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/error-contracts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: packages/error-contracts/uv.lock

      - name: Set up Python
        run: uv python install 3.13.3

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Verify error contracts (codegen + diff)
        working-directory: .
        run: task check:errors

      - name: Type check (codegen + tests)
        working-directory: .
        run: task check:types:errors

      - name: Codegen + validator tests
        run: uv run pytest tests/ -v
