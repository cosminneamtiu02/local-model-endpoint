name: CI

on:
  pull_request:
    branches: [main]
  # Lane 10.8: also fire on push to main so the post-merge state of `main`
  # has a CI run of its own. With strict_required_status_checks_policy=true
  # plus linear-history, the squash commit on main is the same content the
  # PR proved green — but a push run is the explicit canary that "main is
  # always known-green". The concurrency block segments by `github.ref`,
  # so this adds zero extra runs in steady state — only fires the moment a
  # PR squash-merges.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # PR runs share a group keyed on the PR ref so a force-push cancels the
  # stale older run. ``push: main`` runs are keyed by SHA so back-to-back
  # squash-merges (auto-merge has no rate limiter) don't cancel earlier
  # post-merge canary runs — the lane-10.8 rationale ("main is always
  # known-green") requires every squash on main to keep its CI record.
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'push' && github.sha || 'pr' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # ci.yml jobs only verify (no git push); strip the persisted
          # GITHUB_TOKEN from the cloned repo's .git/config to remove
          # unused write surface — defense-in-depth vs a malicious dev
          # dep that might exfiltrate the runner's git config.
          persist-credentials: false

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          # Use the workflow's GITHUB_TOKEN to authenticate the Task
          # binary download against the GitHub releases API. macOS
          # runners share an outbound IP pool that frequently exhausts
          # the unauthenticated 60/hr limit; authenticated requests get
          # 5000/hr per token. Without this, ``darwin-checks`` (and any
          # ubuntu job that lands on a hot IP) fails at the install step
          # with ``API rate limit exceeded``.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/backend/uv.lock
          # Lane 10.3: authenticated GitHub API requests pull uv interpreter
          # downloads under the 5000/hr per-token rate limit instead of the
          # shared 60/hr unauthenticated pool. Same rationale as the
          # ``arduino/setup-task`` block above (macOS runners share an
          # outbound IP pool and routinely exhaust the unauthenticated
          # bucket).
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # ``python-version`` on setup-uv reuses uv's interpreter cache
          # so the per-run download (~30s on cold cache) is amortized
          # across PRs that touch the same Python version. Replaces
          # the explicit ``uv python install`` step.
          python-version: "3.13.13"

      - name: Install dependencies
        # No ``--all-extras`` because neither workspace declares
        # ``[project.optional-dependencies]`` today. FORWARD: when
        # LIP-E001-F002 lands and adds ``schemathesis`` (per ADR-011), if
        # that lands as an extras group rather than a dev-dep, this line
        # must add ``--all-extras`` so CI installs the fuzz-test deps.
        run: uv sync --frozen --dev

      # Lockfile freshness: a manifest change without a corresponding
      # ``uv lock`` regen would slip past the local-only ``task check``
      # otherwise. Symmetric with the ``error-contracts`` job's
      # ``check:errors`` gate. Runs early so a manifest mismatch fails
      # in seconds (vs after the slow test suite) and the actionable
      # error appears at the top of the workflow log. ``check:plist``
      # is intentionally omitted — it is darwin-only (validates the
      # launchd plist with ``plutil``) and the runner is ``ubuntu-latest``;
      # the ``darwin-checks`` job below covers it.
      - name: Lockfile freshness check
        working-directory: .
        run: task check:lockfile

      - name: Lint
        working-directory: .
        run: task check:lint

      - name: Format check
        working-directory: .
        run: task check:format

      - name: Type check
        working-directory: .
        run: task check:types

      - name: Architecture check
        working-directory: .
        run: task check:arch

      # Lane 10.1: ``check:coverage`` is a strict superset of ``check:test``
      # (same ``tests/`` collection plus ``--cov``). The earlier "Tests"
      # step ran ``check:test`` here, then "Coverage gate" ran the full
      # pytest suite again — so every PR ran the backend suite twice in
      # CI. Dropped the duplicate; coverage covers tests.
      - name: Coverage-gated tests (unit + integration + contract)
        working-directory: .
        run: task check:coverage

      # Dependency CVE scan. Lane 16.6: ``continue-on-error`` is now
      # ``false`` per user mandate ("fix everything, strict option"). A
      # real CVE on a pinned production dep fails CI; the operator must
      # bump or pin around it before merging. pip-audit's editable-skip
      # warning is not a CVE finding (it exits 0), so the only failure
      # mode here is an actual advisory.
      - name: Dependency CVE scan
        working-directory: .
        run: task check:audit:backend

      # Lane 10.3: detect-secrets in CI symmetric with the pre-commit hook
      # so an automated commit (e.g. the dependabot-lockfile-sync workflow,
      # which bypasses pre-commit) cannot land a leaked secret on main
      # without surfacing.
      - name: Secret scan
        working-directory: .
        run: task check:secrets

  error-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/error-contracts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # ci.yml jobs only verify (no git push); strip the persisted
          # GITHUB_TOKEN from the cloned repo's .git/config to remove
          # unused write surface — defense-in-depth vs a malicious dev
          # dep that might exfiltrate the runner's git config.
          persist-credentials: false

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          # Use the workflow's GITHUB_TOKEN to authenticate the Task
          # binary download against the GitHub releases API. macOS
          # runners share an outbound IP pool that frequently exhausts
          # the unauthenticated 60/hr limit; authenticated requests get
          # 5000/hr per token. Without this, ``darwin-checks`` (and any
          # ubuntu job that lands on a hot IP) fails at the install step
          # with ``API rate limit exceeded``.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: packages/error-contracts/uv.lock
          # Lane 10.3: see backend-checks job for the github-token rationale.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Same setup-uv interpreter-cache reuse as the backend job —
          # see backend-checks comment for the rationale.
          python-version: "3.13.13"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        working-directory: .
        run: task check:lint:errors

      - name: Format check
        working-directory: .
        run: task check:format:errors

      - name: Verify error contracts (codegen + diff)
        working-directory: .
        run: task check:errors

      - name: Type check (codegen + tests)
        working-directory: .
        run: task check:types:errors

      - name: Codegen + validator tests
        working-directory: .
        run: task test:errors

      # Lane 16.6: strict CVE gate, mirror of the backend job's policy.
      - name: Dependency CVE scan
        working-directory: .
        run: task check:audit:errors

  # Darwin-only check for the launchd plist. ``ubuntu-latest`` cannot run
  # ``plutil``, so plist syntax regressions would otherwise only be caught
  # locally on the maintainer's Mac Mini — exactly the operational surface
  # this repo targets. ~30 sec of macos-runner minutes per PR closes that
  # gap. The job has no ``Install dependencies`` step because ``check:plist``
  # only invokes ``plutil``, which ships in the macOS runner image.
  darwin-checks:
    # Pin to the current major rather than ``macos-latest`` so a GitHub
    # auto-bump to a future major doesn't silently shift the runner image
    # under us — symmetric with the SHA-pinned actions and the
    # python-version pin elsewhere in this file. The job invokes ``plutil``
    # only, so a major bump is almost certainly safe; the discipline is
    # pinning, not actual fragility.
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # ci.yml jobs only verify (no git push); strip the persisted
          # GITHUB_TOKEN from the cloned repo's .git/config to remove
          # unused write surface — defense-in-depth vs a malicious dev
          # dep that might exfiltrate the runner's git config.
          persist-credentials: false

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          # Use the workflow's GITHUB_TOKEN to authenticate the Task
          # binary download against the GitHub releases API. macOS
          # runners share an outbound IP pool that frequently exhausts
          # the unauthenticated 60/hr limit; authenticated requests get
          # 5000/hr per token. Without this, ``darwin-checks`` (and any
          # ubuntu job that lands on a hot IP) fails at the install step
          # with ``API rate limit exceeded``.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: launchd plist syntax check
        run: task check:plist
