name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          # Use the workflow's GITHUB_TOKEN to authenticate the Task
          # binary download against the GitHub releases API. macOS
          # runners share an outbound IP pool that frequently exhausts
          # the unauthenticated 60/hr limit; authenticated requests get
          # 5000/hr per token. Without this, ``darwin-checks`` (and any
          # ubuntu job that lands on a hot IP) fails at the install step
          # with ``API rate limit exceeded``.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/backend/uv.lock
          # Lane 10.3: authenticated GitHub API requests pull uv interpreter
          # downloads under the 5000/hr per-token rate limit instead of the
          # shared 60/hr unauthenticated pool. Same rationale as the
          # ``arduino/setup-task`` block above (macOS runners share an
          # outbound IP pool and routinely exhaust the unauthenticated
          # bucket).
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # ``python-version`` on setup-uv reuses uv's interpreter cache
          # so the per-run download (~30s on cold cache) is amortized
          # across PRs that touch the same Python version. Replaces
          # the explicit ``uv python install`` step.
          python-version: "3.13.13"

      - name: Install dependencies
        run: uv sync --frozen --dev

      # Lockfile freshness: a manifest change without a corresponding
      # ``uv lock`` regen would slip past the local-only ``task check``
      # otherwise. Symmetric with the ``error-contracts`` job's
      # ``check:errors`` gate. Runs early so a manifest mismatch fails
      # in seconds (vs after the slow test suite) and the actionable
      # error appears at the top of the workflow log. ``check:plist``
      # is intentionally omitted — it is darwin-only (validates the
      # launchd plist with ``plutil``) and the runner is ``ubuntu-latest``;
      # the ``darwin-checks`` job below covers it.
      - name: Lockfile freshness check
        working-directory: .
        run: task check:lockfile

      - name: Lint
        working-directory: .
        run: task check:lint

      - name: Format check
        working-directory: .
        run: task check:format

      - name: Type check
        working-directory: .
        run: task check:types

      - name: Architecture check
        working-directory: .
        run: task check:arch

      - name: Tests (unit + integration + contract)
        working-directory: .
        run: task check:test

      # Lane 10.9: enforce the 90% coverage gate in CI. ``task
      # check:coverage`` runs the same pytest invocation the local
      # ``task check:coverage`` does, with ``--cov-fail-under=90``
      # (Taskfile.yml). Without this step, the gate exists locally
      # but CI cannot reject a coverage regression.
      - name: Coverage gate
        working-directory: .
        run: task check:coverage

      # Dependency CVE scan. Lane 16.6: ``continue-on-error`` is now
      # ``false`` per user mandate ("fix everything, strict option"). A
      # real CVE on a pinned production dep fails CI; the operator must
      # bump or pin around it before merging. pip-audit's editable-skip
      # warning is not a CVE finding (it exits 0), so the only failure
      # mode here is an actual advisory.
      - name: Dependency CVE scan
        working-directory: .
        run: task check:audit:backend

  error-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/error-contracts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          # Use the workflow's GITHUB_TOKEN to authenticate the Task
          # binary download against the GitHub releases API. macOS
          # runners share an outbound IP pool that frequently exhausts
          # the unauthenticated 60/hr limit; authenticated requests get
          # 5000/hr per token. Without this, ``darwin-checks`` (and any
          # ubuntu job that lands on a hot IP) fails at the install step
          # with ``API rate limit exceeded``.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: packages/error-contracts/uv.lock
          # Lane 10.3: see backend-checks job for the github-token rationale.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Same setup-uv interpreter-cache reuse as the backend job —
          # see backend-checks comment for the rationale.
          python-version: "3.13.13"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        working-directory: .
        run: task check:lint:errors

      - name: Format check
        working-directory: .
        run: task check:format:errors

      - name: Verify error contracts (codegen + diff)
        working-directory: .
        run: task check:errors

      - name: Type check (codegen + tests)
        working-directory: .
        run: task check:types:errors

      - name: Codegen + validator tests
        working-directory: .
        run: task test:errors

      # Lane 16.6: strict CVE gate, mirror of the backend job's policy.
      - name: Dependency CVE scan
        working-directory: .
        run: task check:audit:errors

  # Darwin-only check for the launchd plist. ``ubuntu-latest`` cannot run
  # ``plutil``, so plist syntax regressions would otherwise only be caught
  # locally on the maintainer's Mac Mini — exactly the operational surface
  # this repo targets. ~30 sec of macos-runner minutes per PR closes that
  # gap. The job has no ``Install dependencies`` step because ``check:plist``
  # only invokes ``plutil``, which ships in the macOS runner image.
  darwin-checks:
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          # Use the workflow's GITHUB_TOKEN to authenticate the Task
          # binary download against the GitHub releases API. macOS
          # runners share an outbound IP pool that frequently exhausts
          # the unauthenticated 60/hr limit; authenticated requests get
          # 5000/hr per token. Without this, ``darwin-checks`` (and any
          # ubuntu job that lands on a hot IP) fails at the install step
          # with ``API rate limit exceeded``.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: launchd plist syntax check
        run: task check:plist
