name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v6

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: apps/backend/uv.lock

      - name: Set up Python
        run: uv python install 3.13.3

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        working-directory: .
        run: task check:lint

      - name: Format check
        working-directory: .
        run: task check:format

      - name: Type check
        working-directory: .
        run: task check:types

      - name: Architecture check
        working-directory: .
        run: task check:arch

      - name: Tests (unit + integration + contract)
        working-directory: .
        run: task check:test

  error-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/error-contracts
    steps:
      - uses: actions/checkout@v6

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: packages/error-contracts/uv.lock

      - name: Set up Python
        run: uv python install 3.13.3

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Verify error contracts (codegen + diff)
        working-directory: .
        run: task check:errors

      - name: Codegen + validator tests
        run: uv run pytest tests/ -v
