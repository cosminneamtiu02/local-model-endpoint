# Auto-merge Dependabot PRs once all required status checks pass.
#
# Policy: ADR-010 (docs/decisions.md) — Dependabot exception to manual-Squash rule.
#
# !!! LIVE: AUTO-MERGE IS ARMED !!!
# --------------------------------------
# `DEPENDABOT_AUTOMERGE_ENABLED` is set to `"true"` and the
# `main-protection` ruleset enforces all three required status checks
# (backend-checks, error-contracts, darwin-checks). Dependabot PRs that
# pass CI are squash-merged automatically by GitHub's merge queue.
#
# Emergency disable (effective on the next pull_request event):
#   gh variable set DEPENDABOT_AUTOMERGE_ENABLED --body "false"
#
# To re-arm later (do this only after re-verifying the ruleset is intact
# per `docs/automerge.md` "Verification commands"):
#   gh variable set DEPENDABOT_AUTOMERGE_ENABLED --body "true"
#
# WHY THE GUARD: `gh pr merge --auto --squash` is only safe when the
# ruleset has required status checks. Without them, --auto has nothing
# to wait for and merges immediately, even if CI is red. This is not a
# theoretical risk -- it happened on PR #19 (in the pre-bootstrap
# template that LIP was forked from), which was merged with failing
# checks because no ruleset was in place. Main was accidentally red for
# ~2 minutes until a follow-up PR with a lockfile fix raced in and
# restored the invariant. The variable + ruleset pair below ensures
# this cannot happen again.
#
# How it works once enabled:
#   - Triggers on every pull_request event.
#   - Short-circuits unless the PR author is dependabot[bot] AND
#     DEPENDABOT_AUTOMERGE_ENABLED == "true".
#   - Calls `gh pr merge --auto --squash`, which marks the PR for
#     auto-merge. GitHub's merge queue then merges it ONLY when every
#     required status check on the `main-protection` ruleset is green
#     and every conversation is resolved.
#
# Merge method is squash, matching the squash-only repo setting (merge
# commits and rebase merging are disabled). The exception allowing
# automated merges for Dependabot PRs (not human PRs) is documented in
# docs/decisions.md as ADR-010.

name: Dependabot auto-merge

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  # No ``workflow_dispatch:`` trigger: the job-level ``if:`` guard
  # checks ``github.event.pull_request.user.login``, which is
  # unpopulated on a manual dispatch event — the job would silently
  # skip. To re-arm after flipping ``DEPENDABOT_AUTOMERGE_ENABLED`` from
  # "false" back to "true", push an empty commit to the open Dependabot
  # PR branch (``git commit --allow-empty -m re-arm`` then
  # ``git push``); that fires ``synchronize`` and reaches the guarded
  # code path. The previous ``workflow_dispatch`` declaration was dead
  # documentation — removing it prevents an operator from believing the
  # affordance exists during an incident.

# A new push (synchronize) supersedes the pending merge-intent attempt
# from the previous event. cancel-in-progress drops the older queued run
# instead of letting them stack while we wait for required checks.
concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Workflow-level default: minimal scopes. The privileged write scopes
# are scoped narrowly to the automerge job below so the token is only
# minted with write surface when the kill-switch + author guard both
# evaluate true. A compromised step prior to the guard (none today, but
# defense-in-depth) would not see write permissions if the guard fails.
permissions:
  contents: read

jobs:
  automerge:
    runs-on: ubuntu-latest
    # ``gh pr merge --auto`` is a single GitHub API call that resolves in
    # ~1 second. 5 minutes leaves headroom for ubuntu-latest cold-start
    # variance during peak-hours runner congestion (cold ``Set up job``
    # provisioning has been observed at 90s+ in worst case) without
    # masking a hung API call as a long-running step. The widening
    # absorbs cold-start variance with ~5x headroom over the 1s API
    # call so a transient cancellation no longer silently leaves a
    # Dependabot PR in not-yet-set state pending the next ``synchronize``.
    timeout-minutes: 5
    permissions:
      # Job-level scopes are minted only when the job's ``if:`` evaluates
      # true, so flipping ``DEPENDABOT_AUTOMERGE_ENABLED`` to ``"false"``
      # also withholds the token's write surface — not just the merge
      # call. ``permissions:`` blocks are declarative, not additive:
      # specifying any scope sets every UNlisted scope to ``none``.
      # ``gh pr merge --auto`` (which calls the
      # ``enablePullRequestAutoMerge`` GraphQL mutation) needs both
      # ``contents: write`` AND ``pull-requests: write``; omitting
      # ``contents`` produces a misleading "Resource not accessible by
      # integration (enablePullRequestAutoMerge)" error. The actual
      # squash-merge commit is still produced by GitHub's native merge
      # engine when required checks pass; this token only queues the
      # merge intent.
      contents: write
      pull-requests: write
    # Check the PR author, not github.actor. github.actor is whoever
    # triggered the current event -- if a human clicks "Update branch"
    # in the UI, github.actor becomes that human, and this job would
    # skip on every human-triggered sync of a Dependabot PR.
    # pull_request.user.login reads the PR author from the event
    # payload, which stays `dependabot[bot]` for the PR's lifetime
    # regardless of who triggers individual events on it.
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false && vars.DEPENDABOT_AUTOMERGE_ENABLED == 'true'
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
