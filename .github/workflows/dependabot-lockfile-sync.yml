# Regenerate workspace lockfiles on Dependabot PRs.
#
# Policy: ADR-010 (docs/decisions.md) — Dependabot exception to manual-Squash rule.
#
# WHY THIS EXISTS
# ---------------
# Dependabot's uv support has a known bug equivalent to its pnpm one:
# when bumping a manifest in a workspace, Dependabot updates the
# pyproject.toml but silently fails to regenerate the matching
# uv.lock. `uv sync --dev` regenerates uv.lock on the fly, so the
# divergence doesn't break CI, but the lockfile in git is still
# silently out of sync after every Dependabot merge -- which is its
# own kind of correctness-eroding bug.
#
# This workflow fires on every Dependabot PR, detects which manifest
# files changed, runs the matching package manager in regeneration
# mode, and pushes the updated lockfile back to the PR branch as a
# follow-up commit.
#
# HOW IT COMPOSES WITH THE AUTO-MERGE WORKFLOW
# --------------------------------------------
# The push back to the PR branch emits a pull_request.synchronize
# event, which re-triggers both this workflow (which no-ops because
# the lockfile is now correct) and dependabot-automerge.yml (which
# re-calls `gh pr merge --auto --squash`, harmlessly idempotent). CI
# then re-runs on the new head commit with the regenerated lockfile,
# passes, and GitHub's merge queue executes the squash-merge.
#
# Net result: a Dependabot PR with a stale uv.lock goes from
# "silently out of sync after merge" to "auto-merges cleanly with
# the lockfile already regenerated" within about 2-3 minutes.
#
# WHY A PAT IS REQUIRED (NOT GITHUB_TOKEN)
# ----------------------------------------
# GitHub's built-in GITHUB_TOKEN has a deliberate security limitation:
# events triggered by a GITHUB_TOKEN-authored push do NOT create new
# workflow runs. This is to prevent workflow-recursion loops. But it
# means that if this workflow pushes the lockfile fix using
# GITHUB_TOKEN, the push will advance the PR's head commit, but CI
# (ci.yml) will never fire on the new commit -- leaving the PR's
# required status checks attached to the OLD, broken commit. The PR
# then sits in a "no checks present on current head" state, and the
# ruleset refuses to merge it.
#
# Pushing with a Personal Access Token (PAT) bypasses this limitation.
# A PAT looks like a normal user to GitHub, so pushes from it trigger
# workflow runs normally.
#
# Use a FINE-GRAINED PAT scoped to this one repository with the
# minimal required permissions:
#   - Contents: Read and write
#   - Pull requests: Read and write
#
# Store it as a DEPENDABOT secret named DEPENDABOT_LOCKFILE_SYNC_PAT --
# NOT a regular Actions secret. Dependabot-triggered workflows can only
# read secrets from the Dependabot secret store (a 2021 supply-chain
# mitigation against compromised dependencies pulling Actions secrets).
# A PAT stored only as an Actions secret resolves to an empty string in
# this workflow and trips the "Verify PAT" guard on every Dependabot PR.
# To set up:
#   1. Create a fine-grained PAT scoped to this repo with the two
#      permissions above
#   2. gh secret set DEPENDABOT_LOCKFILE_SYNC_PAT --app dependabot --body "<PAT>"
#      (the --app dependabot flag is what selects the Dependabot store;
#       omitting it lands in Actions context, which won't work here)
#   3. gh variable set DEPENDABOT_LOCKFILE_SYNC_ENABLED --body "true"
#
# PREREQUISITES (THIS WORKFLOW WILL NO-OP UNTIL ALL ARE SATISFIED)
# ----------------------------------------------------------------
#   1. Repo variable DEPENDABOT_LOCKFILE_SYNC_ENABLED = "true"
#      (controlled separately from DEPENDABOT_AUTOMERGE_ENABLED so the
#       two can be enabled independently if desired)
#   2. Dependabot secret DEPENDABOT_LOCKFILE_SYNC_PAT (Settings ->
#      Secrets and variables -> Dependabot tab) with a fine-grained PAT
#   3. The Phase 5 "Allow GitHub Actions to create and approve pull
#      requests" toggle is already required for auto-merge and is
#      assumed here too
#
# EMERGENCY DISABLE
# -----------------
#   gh variable set DEPENDABOT_LOCKFILE_SYNC_ENABLED --body "false"
# Effective on the next pull_request event. Same pattern as the
# auto-merge kill switch. The workflow continues to run on every
# event but reports conclusion: skipped.
#
# FURTHER READING
# ---------------
#   - docs/automerge.md: the "Lockfile sync" section explains the
#     architecture and the incident that prompted building this
#   - docs/decisions.md ADR-010: the auto-merge exception this feeds
#   - TEMPLATE_FRICTION.md: the "Dependabot workspace lockfile"
#     entry tracks the underlying upstream bug

name: Dependabot lockfile sync

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# GITHUB_TOKEN scopes are intentionally minimal: this workflow's only
# write surface is ``git push`` authenticated by the user-supplied PAT
# (see ``token: ${{ secrets.DEPENDABOT_LOCKFILE_SYNC_PAT }}`` on the
# checkout step). The PAT carries Contents:RW + Pull-requests:RW for the
# scope it needs; GITHUB_TOKEN itself is never exercised, so least-
# privilege says read-only here.
permissions:
  contents: read

# Two synchronize events in quick succession (e.g. Dependabot push followed
# by an unrelated sync) would otherwise spawn two parallel sync runs that
# both try to push lockfile commits — the second loses to the first via
# "non-fast-forward" and the workflow's ``git push || exit 0`` swallows it
# correct-by-luck. Cancelling the older run makes the design intent
# legible and guarantees only one push is ever in flight per PR.
concurrency:
  group: dependabot-lockfile-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false && vars.DEPENDABOT_LOCKFILE_SYNC_ENABLED == 'true'
    steps:
      - name: Verify PAT is configured
        env:
          PAT: ${{ secrets.DEPENDABOT_LOCKFILE_SYNC_PAT }}
        run: |
          set -euo pipefail
          if [ -z "$PAT" ]; then
            echo "::error::DEPENDABOT_LOCKFILE_SYNC_PAT secret is not set, but DEPENDABOT_LOCKFILE_SYNC_ENABLED variable is 'true'. Either create a fine-grained PAT scoped to this repo (Contents:RW, Pull requests:RW) and save it as DEPENDABOT_LOCKFILE_SYNC_PAT, or unset the variable with: gh variable set DEPENDABOT_LOCKFILE_SYNC_ENABLED --body 'false'"
            exit 1
          fi

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.DEPENDABOT_LOCKFILE_SYNC_PAT }}

      - name: Guard against self-triggered loops
        id: loop_guard
        run: |
          set -euo pipefail
          LAST_AUTHOR=$(git log -1 --format='%ae' HEAD)
          LAST_SUBJECT=$(git log -1 --format='%s' HEAD)
          echo "Last commit author email: $LAST_AUTHOR"
          echo "Last commit subject: $LAST_SUBJECT"
          # Two independent guards: the user-id check is the fast path
          # (catches every github-actions[bot] commit), and the
          # commit-subject check is the durable fallback (works even if
          # GitHub ever rotates the actions bot user-id, which is rare
          # but documented). Either one matching short-circuits the run.
          if echo "$LAST_AUTHOR" | grep -qF "41898282+github-actions"; then
            echo "Last commit is from github-actions[bot]; this workflow already ran on a previous event. Skipping to prevent loop."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif echo "$LAST_SUBJECT" | grep -qF "chore(deps): regenerate lockfiles after dependabot bump"; then
            echo "Last commit subject matches this workflow's own message; this workflow already ran. Skipping to prevent loop."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect which manifests changed
        id: changed
        if: steps.loop_guard.outputs.skip != 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "Diffing $BASE_SHA..$HEAD_SHA"

          # Fail-safe: a missing object (fetch-depth too shallow on a
          # long-history PR) would otherwise produce empty diff output
          # and the workflow would no-op silently. Surface it as an
          # explicit error so the operator sees the fetch-depth issue.
          if ! git rev-parse --verify "$BASE_SHA" >/dev/null 2>&1; then
            echo "::error::base SHA $BASE_SHA not present in fetched history; bump fetch-depth on the checkout step."
            exit 1
          fi
          if ! git rev-parse --verify "$HEAD_SHA" >/dev/null 2>&1; then
            echo "::error::head SHA $HEAD_SHA not present in fetched history; bump fetch-depth on the checkout step."
            exit 1
          fi

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED"

          NEEDS_UV_BACKEND=false
          NEEDS_UV_ERROR_CONTRACTS=false

          # Workspace-aware detection. The two ``if`` branches are kept
          # explicit (rather than a single glob) so the detector also
          # acts as the canonical list of workspaces — when a third
          # workspace lands, this block surfaces in PR review and the
          # contributor knows to add it. Add a sibling regenerate step
          # below at the same time.
          if echo "$CHANGED" | grep -qE '^apps/backend/pyproject\.toml$'; then
            NEEDS_UV_BACKEND=true
          fi
          if echo "$CHANGED" | grep -qE '^packages/error-contracts/pyproject\.toml$'; then
            NEEDS_UV_ERROR_CONTRACTS=true
          fi

          echo "needs_uv_backend=$NEEDS_UV_BACKEND" >> "$GITHUB_OUTPUT"
          echo "needs_uv_error_contracts=$NEEDS_UV_ERROR_CONTRACTS" >> "$GITHUB_OUTPUT"

          if [ "$NEEDS_UV_BACKEND" = "false" ] && [ "$NEEDS_UV_ERROR_CONTRACTS" = "false" ]; then
            echo "No manifest files changed. This PR probably touches only lockfiles or other files already in sync; nothing to do."
          fi

      - name: Set up uv
        if: steps.loop_guard.outputs.skip != 'true' && (steps.changed.outputs.needs_uv_backend == 'true' || steps.changed.outputs.needs_uv_error_contracts == 'true')
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '{apps/backend,packages/error-contracts}/uv.lock'
          # Pin to the same Python interpreter ci.yml uses (3.13.13). Without
          # the pin, ``uv lock`` runs under whatever 3.13.x ``setup-uv``
          # downloads at job time — typically the most recent. If 3.13.14
          # ships before the matrix is bumped, the regenerated ``uv.lock``
          # could resolve against 3.13.14 while CI's ``uv sync --frozen``
          # validates under 3.13.13, producing the exact divergence this
          # workflow exists to prevent.
          python-version: "3.13.13"

      - name: Regenerate backend uv.lock
        if: steps.loop_guard.outputs.skip != 'true' && steps.changed.outputs.needs_uv_backend == 'true'
        working-directory: apps/backend
        run: uv lock

      - name: Regenerate error-contracts uv.lock
        if: steps.loop_guard.outputs.skip != 'true' && steps.changed.outputs.needs_uv_error_contracts == 'true'
        working-directory: packages/error-contracts
        run: uv lock

      - name: Commit and push lockfile updates
        if: steps.loop_guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only lockfile paths to avoid accidentally committing anything else.
          # Iterate so a missing lockfile is silently skipped while a real git error
          # (corrupt index, permission failure) still propagates.
          for f in apps/backend/uv.lock packages/error-contracts/uv.lock; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done

          if git diff --cached --quiet; then
            echo "No lockfile changes to commit. Dependabot may have regenerated them correctly, or this PR touches no relevant manifests."
            exit 0
          fi

          echo "Lockfile changes detected:"
          git diff --cached --stat

          git commit \
            -m "chore(deps): regenerate lockfiles after dependabot bump" \
            -m "Automated follow-up commit from .github/workflows/dependabot-lockfile-sync.yml. Dependabot's uv support does not regenerate workspace lockfiles when bumping a manifest; this workflow runs uv in regeneration mode and pushes the updated lockfile back so CI's frozen-lockfile check passes."

          # Lane 10.10: discriminate between a benign concurrent-push
          # collision (non-fast-forward — another sync run beat us to
          # the push, so the PR head already has the correct lockfile)
          # and a real push failure (auth/scope/network) that should
          # surface as a workflow error. The prior unconditional
          # ``|| exit 0`` masked credential errors as silent successes.
          # Lane 10.4: ``--force-with-lease=<ref>:<sha>`` bounds the push
          # to the same head this run started from. If Dependabot
          # force-pushes a rebased version of the PR mid-execution
          # (``@dependabot rebase``), the lease check fails and the push
          # is rejected — preventing a stale lockfile from clobbering a
          # rebased manifest.
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          push_status=0
          push_output=$(git push --force-with-lease="$HEAD_REF:$HEAD_SHA" 2>&1) || push_status=$?
          if [ "$push_status" != 0 ]; then
            if echo "$push_output" | grep -qE "non-fast-forward|stale info"; then
              echo "Concurrent push or upstream rebase detected; another lockfile-sync run will reconcile."
              exit 0
            fi
            echo "$push_output"
            exit "$push_status"
          fi
          echo "$push_output"
