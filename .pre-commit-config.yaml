# ``minimum_pre_commit_version`` matches the floor that
# ``default_install_hook_types`` requires (added in 3.2.0). A fresh-clone
# developer running an older pre-commit binary would otherwise silently
# skip the pre-push install — surfacing the version requirement here
# fails loudly instead of degrading the safety net.
minimum_pre_commit_version: "3.2.0"
# ``default_install_hook_types`` makes the pre-push-staged hooks (pytest,
# pyright, import-linter below) install on a plain ``pre-commit install``.
# Without this, a fresh-clone developer who does not also run
# ``pre-commit install --hook-type pre-push`` silently gets none of the
# slow safety nets — the most common bootstrap stumble for this repo.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^Taskfile\.yml$
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      # ``detect-private-key`` is filename + content match,
      # complementary to ``detect-secrets`` above (which is
      # entropy-/regex-based). Catches an empty ``id_rsa`` or a
      # partial-paste ``.pem`` that lacks the standard BEGIN header
      # — exactly the case the entropy scanner misses.
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Lane 10.8: ``--fix`` removed so pre-commit and CI behave
      # identically (CI runs ``ruff check`` without auto-fix). The
      # auto-fix surface produced a window where ``git commit`` could
      # silently rewrite files between staged and committed, then CI
      # would still flag a finding the developer never saw. With
      # ``ruff check`` everywhere, a finding is surfaced once at commit
      # time and the contributor edits manually.
      - id: ruff
      - id: ruff-format

  - repo: local
    hooks:
      # Pre-commit: validate Taskfile syntax (check-yaml excludes Taskfile.yml).
      # The ``command -v task`` guard surfaces a clearer error than the raw
      # "bash: task: command not found" if the developer hasn't installed
      # Taskfile yet.
      - id: taskfile-syntax
        name: Validate Taskfile syntax
        entry: scripts/check_taskfile.sh
        language: system
        pass_filenames: false
        files: ^Taskfile\.yml$

      # Pre-push: fast safety net only (lane 10.6).
      #
      # Previously this stage ran the full unit+integration+contract pytest
      # suite + pyright + import-linter — a strict subset of what
      # ``main-protection`` enforces in CI. Running both meant every
      # ``git push`` paid the slow safety net AND CI ran the same checks
      # again seconds later, creating real pressure to use ``--no-verify``
      # (which CLAUDE.md forbids). Pre-push is now the *unit* tier only;
      # CI is the authoritative gate for integration/contract/types/arch.
      # The same files run pre-commit (ruff/format/secret-scan), so the
      # remaining tier-jump is "unit tests pass before push, every other
      # gate runs in CI." Operators wanting the full local mirror still
      # have ``task check`` as the sacred-rule entry point.
      - id: pytest-unit
        name: Backend unit tests
        entry: bash -c "set -euo pipefail; cd apps/backend && uv run --frozen pytest tests/unit/ -q && cd ../../packages/error-contracts && uv run --frozen pytest tests/ -q"
        language: system
        pass_filenames: false
        stages: [pre-push]
