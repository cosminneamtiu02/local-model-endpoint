# ``default_install_hook_types`` makes the pre-push-staged hooks (pytest,
# pyright, import-linter below) install on a plain ``pre-commit install``.
# Without this, a fresh-clone developer who does not also run
# ``pre-commit install --hook-type pre-push`` silently gets none of the
# slow safety nets — the most common bootstrap stumble for this repo.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^Taskfile\.yml$
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # Pre-commit: validate Taskfile syntax (check-yaml excludes Taskfile.yml).
      # The ``command -v task`` guard surfaces a clearer error than the raw
      # "bash: task: command not found" if the developer hasn't installed
      # Taskfile yet.
      - id: taskfile-syntax
        name: Validate Taskfile syntax
        entry: scripts/check_taskfile.sh
        language: system
        pass_filenames: false
        files: ^Taskfile\.yml$

      # Pre-push: run unit tests before code leaves the machine.
      - id: pytest-unit
        name: Backend + error-contracts unit tests
        entry: bash -c "set -euo pipefail; cd apps/backend && uv run pytest tests/unit/ -q && cd ../../packages/error-contracts && uv run pytest tests/ -q"
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Pre-push: type check (slow; matches ADR-009 tier).
      - id: pyright
        name: Backend type check
        entry: bash -c "set -euo pipefail; cd apps/backend && uv run pyright app/"
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Pre-push: architecture check (slow; matches ADR-009 tier).
      - id: import-linter
        name: Backend architecture check
        entry: bash -c "set -euo pipefail; cd apps/backend && uv run lint-imports --config architecture/import-linter-contracts.ini"
        language: system
        pass_filenames: false
        stages: [pre-push]
