version: "3"

vars:
  BACKEND_DIR: apps/backend
  ERROR_CONTRACTS_DIR: packages/error-contracts

tasks:
  # ── Development ──────────────────────────────────────────────
  dev:
    desc: Start backend with hot reload (host/port read from Settings)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run python -m app --reload

  # ── Check (run before declaring work done) ───────────────────
  check:
    desc: Run ALL checks — lint, format, types, arch, tests, error contracts, plist, lockfile, audit
    # ``check:lockfile`` runs before the slow test suite so a manifest/lockfile
    # mismatch fails fast (seconds) instead of after ~minutes of test runtime.
    # ``check:audit`` runs last because it depends on a synced env and surfaces
    # CVE advisories — included so ``task check`` is the local mirror of the
    # CI gate, per CLAUDE.md sacred rule #4 ("run task check before declaring
    # any work done").
    cmds:
      - task: check:lint
      - task: check:format
      - task: check:lockfile
      - task: check:types
      - task: check:arch
      - task: check:test
      - task: check:errors
      - task: check:plist
      - task: check:audit

  check:lint:
    desc: Run linter (backend + error-contracts)
    cmds:
      - task: lint
      - task: check:lint:errors

  check:lint:errors:
    desc: Run ruff check on the error-contracts package
    dir: "{{.ERROR_CONTRACTS_DIR}}"
    cmds:
      - uv run ruff check scripts/ tests/

  check:format:
    desc: Verify formatting (backend + error-contracts)
    cmds:
      - task: check:format:backend
      - task: check:format:errors

  check:format:backend:
    desc: Verify formatting on the backend app
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format --check app/ tests/

  check:format:errors:
    desc: Verify formatting on the error-contracts package
    dir: "{{.ERROR_CONTRACTS_DIR}}"
    cmds:
      - uv run ruff format --check scripts/ tests/

  check:types:
    desc: Run type checker (backend + error-contracts)
    cmds:
      - task: check:types:backend
      - task: check:types:errors

  check:types:backend:
    desc: Run pyright on the backend app
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pyright app/

  check:types:errors:
    desc: Run pyright on the error-contracts package (codegen + tests)
    dir: packages/error-contracts
    cmds:
      - uv run pyright

  check:arch:
    desc: Run import-linter architecture checks
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run lint-imports --config architecture/import-linter-contracts.ini

  check:test:
    desc: Run unit + integration tests
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:contract

  check:errors:
    desc: Verify error contracts are up to date
    cmds:
      - task: errors:generate
      - git diff --exit-code apps/backend/app/exceptions/_generated/
      - |
        set -euo pipefail
        UNTRACKED=$(git ls-files --others --exclude-standard apps/backend/app/exceptions/_generated/)
        if [ -n "$UNTRACKED" ]; then
          echo "Untracked generated error files (forgot to git add?):"
          echo "$UNTRACKED"
          exit 1
        fi
      # Idempotency guard: assert ruff format wouldn't rewrite the codegen
      # output. Without this, a future codegen change that emits a too-long
      # line gets re-wrapped by ruff format on a developer's machine but
      # would not be caught here at CI time.
      - cd apps/backend && uv run ruff format --check app/exceptions/_generated/

  check:plist:
    desc: Validate launchd plist template schema with plutil -lint (macOS only)
    platforms: [darwin]
    cmds:
      # plutil only checks XML/plist syntax; the __HOME__ placeholder string
      # is fine syntactically. Path semantics are validated at install time
      # when the substitution lands in ~/Library/LaunchAgents/.
      - plutil -lint infra/launchd/com.lip.ollama.plist.tmpl

  check:lockfile:
    desc: Verify lockfiles are in sync with pyproject.toml (both workspaces)
    cmds:
      - task: check:lockfile:backend
      - task: check:lockfile:errors

  check:lockfile:backend:
    desc: Verify backend lockfile
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv lock --check

  check:lockfile:errors:
    desc: Verify error-contracts lockfile
    dir: packages/error-contracts
    cmds:
      - uv lock --check

  check:audit:
    desc: Run pip-audit on backend + error-contracts deps (CVE scan)
    cmds:
      - task: check:audit:backend
      - task: check:audit:errors

  check:audit:backend:
    desc: Run pip-audit on backend deps
    dir: "{{.BACKEND_DIR}}"
    # pip-audit 2.10 rejects ``--disable-pip`` unless paired with ``-r``;
    # we audit the resolved virtualenv directly (the env that ``uv sync``
    # produced from the frozen lockfile), which is the truthful target —
    # whatever's installed is what the running process loads.
    # ``--skip-editable`` skips the local ``lip-backend`` editable install
    # (pip-audit cannot resolve it against PyPI — it's the project itself).
    # ``--strict`` is intentionally omitted: with it, pip-audit treats the
    # editable-skip as a fatal warning and exits 1 even with zero CVEs.
    # Real CVEs still cause a non-zero exit without ``--strict``.
    cmds:
      - uv run --frozen pip-audit --skip-editable

  check:audit:errors:
    desc: Run pip-audit on error-contracts deps
    dir: "{{.ERROR_CONTRACTS_DIR}}"
    # Same flag rationale as the backend variant above.
    cmds:
      - uv run --frozen pip-audit --skip-editable

  check:coverage:
    desc: Run full test suite with coverage and enforce the fail_under gate
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=90

  # ── Testing ──────────────────────────────────────────────────
  test:
    desc: Run all tests (unit + integration + contract)
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:contract

  # ``--frozen`` keeps these test invocations aligned with CI (which runs
  # ``uv sync --frozen --dev``) and the pre-push hook. Without ``--frozen``,
  # ``uv run`` can silently re-resolve and upgrade transient deps, so the
  # pre-push hook ends up stricter than the Taskfile — exactly inverted
  # from the safety net we want.
  test:unit:
    desc: Run unit tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen pytest tests/unit/ -v

  test:integration:
    desc: Run integration tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen pytest tests/integration/ -v

  test:contract:
    desc: Run contract tests (Schemathesis)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen pytest tests/contract/ -v

  test:errors:
    desc: Run error-contracts package tests
    dir: packages/error-contracts
    cmds:
      - uv run --frozen pytest tests/ -v

  # ── Linting & Formatting ─────────────────────────────────────
  lint:
    desc: Run linter
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff check app/ tests/

  format:
    desc: Run formatter
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format app/ tests/

  # ── Code Generation ──────────────────────────────────────────
  errors:generate:
    desc: Generate Python error classes from errors.yaml
    dir: packages/error-contracts
    cmds:
      - uv run --frozen python -m scripts.generate

  # ── Ollama launchd agent (one-time per machine; see docs/ollama-launchd.md) ──
  ollama:install:
    desc: Install the Ollama launchd agent (renders plist template + bootstraps under gui/$UID)
    cmds:
      - mkdir -p ~/Library/Logs/ollama
      - mkdir -p ~/Library/LaunchAgents
      # Refuse to run as root — LaunchAgent must be in user domain, not /Library/LaunchDaemons/.
      - test "$(id -u)" -ne 0 || { echo "Refuse to install as root — LaunchAgent only"; exit 1; }
      # Substitute __HOME__ with the operator's $HOME at install time
      # (launchd does not expand env vars in plists). Use Python's
      # str.replace (not sed) so a $HOME containing & or | doesn't
      # collide with sed's substitution-pattern metacharacters
      # (``$HOME=/Users/cosmin&laptop`` would corrupt the plist with
      # sed; Python's literal replace is metacharacter-safe).
      - >
        python3 -c "import os, sys, pathlib;
        src = pathlib.Path('infra/launchd/com.lip.ollama.plist.tmpl').read_text();
        sys.stdout.write(src.replace('__HOME__', os.environ['HOME']))" > ~/Library/LaunchAgents/com.lip.ollama.plist
      - launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.lip.ollama.plist

  ollama:uninstall:
    desc: Remove the Ollama launchd agent (boots out + deletes the installed plist)
    cmds:
      # `bootout` exits non-zero when the agent isn't loaded; tolerate that so
      # the task is idempotent and AC-10 ("exits 0") holds on a clean machine.
      - launchctl bootout gui/$(id -u)/com.lip.ollama || true
      - rm -f ~/Library/LaunchAgents/com.lip.ollama.plist

  ollama:status:
    desc: Report the launchctl state of the Ollama agent in the gui/$UID domain
    cmds:
      - launchctl print gui/$(id -u)/com.lip.ollama
