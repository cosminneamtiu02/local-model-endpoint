version: "3"

vars:
  BACKEND_DIR: apps/backend

tasks:
  # ── Development ──────────────────────────────────────────────
  dev:
    desc: Start backend with hot reload
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run uvicorn app.main:app --reload --host 127.0.0.1 --port 8000

  # ── Check (run before declaring work done) ───────────────────
  check:
    desc: Run ALL checks — lint, types, arch, tests, error contracts, plist
    cmds:
      - task: check:lint
      - task: check:types
      - task: check:arch
      - task: check:test
      - task: check:errors
      - task: check:plist

  check:lint:
    desc: Run linter
    cmds:
      - task: lint

  check:types:
    desc: Run type checker
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pyright app/

  check:arch:
    desc: Run import-linter architecture checks
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run lint-imports --config architecture/import-linter-contracts.ini

  check:test:
    desc: Run unit + integration tests
    cmds:
      - task: test:unit
      - task: test:integration

  check:errors:
    desc: Verify error contracts are up to date
    cmds:
      - task: errors:generate
      - git diff --exit-code apps/backend/app/exceptions/_generated/
      - |
        UNTRACKED=$(git ls-files --others --exclude-standard apps/backend/app/exceptions/_generated/)
        if [ -n "$UNTRACKED" ]; then
          echo "Untracked generated error files (forgot to git add?):"
          echo "$UNTRACKED"
          exit 1
        fi

  check:plist:
    desc: Validate launchd plist schema with plutil -lint
    cmds:
      - plutil -lint infra/launchd/com.lip.ollama.plist

  # ── Testing ──────────────────────────────────────────────────
  test:
    desc: Run all tests (unit + integration + contract)
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:contract

  test:unit:
    desc: Run unit tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/unit/ -v

  test:integration:
    desc: Run integration tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/integration/ -v

  test:contract:
    desc: Run contract tests (Schemathesis)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest tests/contract/ -v

  # ── Linting & Formatting ─────────────────────────────────────
  lint:
    desc: Run linter
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff check .

  format:
    desc: Run formatter
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format .

  # ── Code Generation ──────────────────────────────────────────
  errors:generate:
    desc: Generate Python error classes from errors.yaml
    dir: packages/error-contracts
    cmds:
      - uv run python -c "
        from pathlib import Path;
        from scripts.generate import generate_python;
        p = Path('errors.yaml');
        generate_python(p, Path('../../apps/backend/app/exceptions/_generated'));
        print('Generated Python error classes')
        "

  # ── Ollama launchd agent (one-time per machine; see docs/ollama-launchd.md) ──
  ollama:install:
    desc: Install the Ollama launchd agent (copies plist + bootstraps under gui/$UID).
    cmds:
      - mkdir -p ~/Library/Logs/ollama
      - mkdir -p ~/Library/LaunchAgents
      - cp infra/launchd/com.lip.ollama.plist ~/Library/LaunchAgents/com.lip.ollama.plist
      - launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.lip.ollama.plist

  ollama:uninstall:
    desc: Remove the Ollama launchd agent (boots out + deletes the installed plist).
    cmds:
      - launchctl bootout gui/$(id -u)/com.lip.ollama
      - rm -f ~/Library/LaunchAgents/com.lip.ollama.plist

  ollama:status:
    desc: Report the launchctl state of the Ollama agent in the gui/$UID domain.
    cmds:
      - launchctl print gui/$(id -u)/com.lip.ollama
