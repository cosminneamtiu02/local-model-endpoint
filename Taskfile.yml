version: "3"

vars:
  BACKEND_DIR: apps/backend
  ERROR_CONTRACTS_DIR: packages/error-contracts

tasks:
  # ── Development ──────────────────────────────────────────────
  dev:
    desc: Start backend with hot reload (host/port read from Settings)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run python -m app --reload

  # ── Check (run before declaring work done) ───────────────────
  check:
    desc: Run ALL checks — lint, format, lockfile, types, arch, coverage-gated tests, error contracts, plist, audit, secrets
    # ``check:lockfile`` runs before the slow test suite so a manifest/lockfile
    # mismatch fails fast (seconds) instead of after ~minutes of test runtime.
    # ``check:coverage`` runs the full pytest suite WITH coverage and enforces
    # the fail_under gate. The previously-listed ``check:test`` step has been
    # dropped (lane 10.1): ``check:coverage`` is a strict superset (same
    # ``tests/`` collection plus ``--cov``), so running both made every
    # ``task check`` execute the full backend suite twice.
    # ``check:audit`` and ``check:secrets`` run last because they depend on a
    # synced env and surface CVE advisories / leaked-secret findings — included
    # so ``task check`` is the local mirror of the CI gate, per CLAUDE.md
    # sacred rule #4 ("run task check before declaring any work done").
    cmds:
      - task: check:lint
      - task: check:format
      - task: check:lockfile
      - task: check:types
      - task: check:arch
      - task: check:coverage
      - task: check:coverage:errors
      - task: check:errors
      - task: check:test-class-regex-sync
      - task: check:plist
      - task: check:audit
      - task: check:secrets

  check:lint:
    desc: Run linter (backend + error-contracts)
    cmds:
      - task: lint
      - task: check:lint:errors

  check:lint:errors:
    desc: Run ruff check on the error-contracts package
    dir: "{{.ERROR_CONTRACTS_DIR}}"
    cmds:
      # ``--frozen`` mirrors the test-target rationale (see comment block
      # before ``test:``): every dev-tool invocation must run against the
      # lockfile-resolved env so local check is the canonical mirror of CI.
      - uv run --frozen ruff check scripts/ tests/

  check:format:
    desc: Verify formatting (backend + error-contracts)
    cmds:
      - task: check:format:backend
      - task: check:format:errors

  check:format:backend:
    desc: Verify formatting on the backend app
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen ruff format --check app/ tests/

  check:format:errors:
    desc: Verify formatting on the error-contracts package
    dir: "{{.ERROR_CONTRACTS_DIR}}"
    cmds:
      - uv run --frozen ruff format --check scripts/ tests/

  check:types:
    desc: Run type checker (backend + error-contracts)
    cmds:
      - task: check:types:backend
      - task: check:types:errors

  check:types:backend:
    desc: Run pyright on the backend app
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen pyright app/

  check:types:errors:
    desc: Run pyright on the error-contracts package (codegen + tests)
    dir: packages/error-contracts
    cmds:
      - uv run --frozen pyright

  check:arch:
    desc: Run import-linter architecture checks
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen lint-imports --config architecture/import-linter-contracts.ini

  check:test:
    desc: Run unit + integration tests
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:contract

  check:errors:
    desc: Verify error contracts are up to date
    cmds:
      - task: errors:generate
      - git diff --exit-code apps/backend/app/exceptions/_generated/
      - |
        set -euo pipefail
        UNTRACKED=$(git ls-files --others --exclude-standard apps/backend/app/exceptions/_generated/)
        if [ -n "$UNTRACKED" ]; then
          echo "Untracked generated error files (forgot to git add?):"
          echo "$UNTRACKED"
          exit 1
        fi
      # Idempotency guard: assert ruff format wouldn't rewrite the codegen
      # output. Without this, a future codegen change that emits a too-long
      # line gets re-wrapped by ruff format on a developer's machine but
      # would not be caught here at CI time. The inline ``cd
      # apps/backend &&`` prefix is intentional here (rather than the
      # ``dir: "{{.BACKEND_DIR}}"`` directive used elsewhere) because the
      # task as a whole runs from the repo root — earlier steps in the
      # ``cmds:`` list use repo-root paths (``apps/backend/app/exceptions/
      # _generated/``) for ``git diff`` and ``git ls-files``. Splitting
      # this into a separate sub-task with ``dir:`` would land worse than
      # the inline ``cd``: two task-graph nodes for what reads as a
      # single check.
      - cd apps/backend && uv run --frozen ruff format --check app/exceptions/_generated/

  check:plist:
    desc: Validate launchd plist template schema with plutil -lint (macOS only)
    platforms: [darwin]
    cmds:
      # plutil only checks XML/plist syntax; the __HOME__ placeholder string
      # is fine syntactically. Path semantics are validated at install time
      # when the substitution lands in ~/Library/LaunchAgents/.
      - plutil -lint infra/launchd/com.lip.ollama.plist.tmpl

  check:lockfile:
    desc: Verify lockfiles are in sync with pyproject.toml (both workspaces)
    cmds:
      - task: check:lockfile:backend
      - task: check:lockfile:errors

  check:lockfile:backend:
    desc: Verify backend lockfile
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv lock --check

  check:lockfile:errors:
    desc: Verify error-contracts lockfile
    dir: packages/error-contracts
    cmds:
      - uv lock --check

  check:audit:
    desc: Run pip-audit on backend + error-contracts deps (CVE scan)
    cmds:
      - task: check:audit:backend
      - task: check:audit:errors

  check:audit:backend:
    desc: Run pip-audit on backend deps
    dir: "{{.BACKEND_DIR}}"
    # pip-audit 2.10 rejects ``--disable-pip`` unless paired with ``-r``;
    # we audit the resolved virtualenv directly (the env that ``uv sync``
    # produced from the frozen lockfile), which is the truthful target —
    # whatever's installed is what the running process loads.
    # ``--skip-editable`` skips the local ``lip-backend`` editable install
    # (pip-audit cannot resolve it against PyPI — it's the project itself).
    # ``--strict`` is intentionally omitted: with it, pip-audit treats the
    # editable-skip as a fatal warning and exits 1 even with zero CVEs.
    # Real CVEs still cause a non-zero exit without ``--strict``.
    cmds:
      - uv run --frozen pip-audit --skip-editable

  check:audit:errors:
    desc: Run pip-audit on error-contracts deps
    dir: "{{.ERROR_CONTRACTS_DIR}}"
    # Same flag rationale as the backend variant above.
    cmds:
      - uv run --frozen pip-audit --skip-editable

  check:secrets:
    desc: Scan the working tree for leaked secrets against .secrets.baseline
    # Lane 10.3: pre-commit runs detect-secrets on staged files at commit time,
    # but CI and ``task check`` had no equivalent gate — a contributor using
    # ``--no-verify`` (forbidden) or an automated commit (e.g. the
    # dependabot-lockfile-sync workflow) could land a leaked secret on main
    # without surfacing. This target tracks all repository files and is wired
    # into ``task check`` so the symmetry with pre-commit holds.
    #
    # ``uv tool run`` (not ``uv run --with``) so detect-secrets resolves
    # against an isolated cache rather than synthesizing a per-call venv
    # against the backend lockfile (which doesn't and shouldn't carry
    # detect-secrets as a dep). The baseline path is relative to the
    # working tree root, where ``.secrets.baseline`` actually lives.
    cmds:
      # ``git ls-files -z | xargs -0`` is the canonical safe pattern: any
      # tracked path containing whitespace (none today, but a future asset
      # could) would otherwise word-split through the bare ``$(git ls-files)``
      # substitution and pass two broken paths to detect-secrets. ``-r``
      # makes xargs a no-op on an empty list rather than running the hook
      # with zero arguments (which would scan every file under the cwd).
      - >
        git ls-files -z |
        xargs -0 -r uv tool run --from detect-secrets==1.5.0
        detect-secrets-hook --baseline .secrets.baseline

  check:coverage:
    desc: Run full test suite with coverage and enforce the fail_under gate
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=90

  check:coverage:errors:
    desc: Run error-contracts test suite with coverage and enforce the fail_under gate
    # Mirrors the apps/backend coverage gate so the codegen module
    # (``scripts/generate.py`` — the source-of-truth enforcer for
    # errors.yaml invariants) carries a coverage floor symmetric with
    # the runtime backend it generates code for. Without this gate, a
    # regression deleting a ``test_codegen_rejects_*`` case would ship
    # green on the codegen-side workspace. The 80% floor is the
    # measured-baseline-minus-margin; round-19 follow-up bumps to 90%
    # in lockstep with backend after walking the uncovered defensive
    # branches in ``generate.py``.
    dir: "{{.ERROR_CONTRACTS_DIR}}"
    cmds:
      - uv run --frozen pytest tests/ --cov=scripts --cov-report=term-missing --cov-fail-under=80

  check:test-class-regex-sync:
    desc: Verify the no-test-classes regex stays in lockstep across both workspace conftests
    # The CLAUDE.md "Never write a test class" sacred rule is enforced
    # by the ``_TEST_CLASS_PATTERN`` regex declared identically in
    # ``apps/backend/tests/conftest.py`` and
    # ``packages/error-contracts/tests/conftest.py``. Cross-workspace
    # import isn't installable, so the duplication is intentional —
    # but the only sync mechanism today is a prose comment. This task
    # diffs the regex declarations and exits non-zero on drift, so a
    # tightening edit lands in both workspaces atomically.
    cmds:
      - |
        set -euo pipefail
        a=$(grep '_TEST_CLASS_PATTERN = re.compile' apps/backend/tests/conftest.py)
        b=$(grep '_TEST_CLASS_PATTERN = re.compile' packages/error-contracts/tests/conftest.py)
        if [ "$a" != "$b" ]; then
          echo "::error::_TEST_CLASS_PATTERN drift between workspaces"
          echo "apps/backend: $a"
          echo "packages/error-contracts: $b"
          exit 1
        fi

  # ── Testing ──────────────────────────────────────────────────
  test:
    desc: Run all tests (unit + integration + contract)
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:contract

  # ``--frozen`` keeps these test invocations aligned with CI (which runs
  # ``uv sync --frozen --dev``) and the pre-push hook. Without ``--frozen``,
  # ``uv run`` can silently re-resolve and upgrade transient deps, so the
  # pre-push hook ends up stricter than the Taskfile — exactly inverted
  # from the safety net we want.
  test:unit:
    desc: Run unit tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen pytest tests/unit/ -v

  test:integration:
    desc: Run integration tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen pytest tests/integration/ -v

  test:contract:
    desc: Run contract tests (OpenAPI canary + RFC 7807 wire shape; Schemathesis fuzz lands with LIP-E001-F002)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen pytest tests/contract/ -v

  test:errors:
    desc: Run error-contracts package tests
    dir: packages/error-contracts
    cmds:
      - uv run --frozen pytest tests/ -v

  # ── Linting & Formatting ─────────────────────────────────────
  lint:
    desc: Run linter
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen ruff check app/ tests/

  format:
    desc: Run formatter
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run --frozen ruff format app/ tests/

  # ── Code Generation ──────────────────────────────────────────
  errors:generate:
    desc: Generate Python error classes from errors.yaml
    dir: packages/error-contracts
    cmds:
      - uv run --frozen python -m scripts.generate

  # ── Ollama launchd agent (one-time per machine; see docs/ollama-launchd.md) ──
  ollama:install:
    desc: Install the Ollama launchd agent (renders plist template + bootstraps under gui/$UID; idempotent on re-run)
    cmds:
      - mkdir -p ~/Library/Logs/ollama
      - mkdir -p ~/Library/LaunchAgents
      # Refuse to run as root — LaunchAgent must be in user domain, not /Library/LaunchDaemons/.
      - test "$(id -u)" -ne 0 || { echo "Refuse to install as root — LaunchAgent only"; exit 1; }
      # Substitute __HOME__ with the operator's $HOME at install time
      # (launchd does not expand env vars in plists). Use Python's
      # str.replace (not sed) so a $HOME containing & or | doesn't
      # collide with sed's substitution-pattern metacharacters
      # (``$HOME=/Users/cosmin&laptop`` would corrupt the plist with
      # sed; Python's literal replace is metacharacter-safe). Stage the
      # rendered plist next to the install target then diff before
      # overwriting so an operator-side hand-edit is reported, not silently
      # clobbered (mirrors `task check:errors`'s diff-then-overwrite shape).
      # ``rm -f`` first clears any pre-existing entry at the staging path
      # (file or symlink) so a malicious symlink in ~/Library/LaunchAgents/
      # cannot redirect the rendered plist body to a write-controlled
      # location. ``os.path.expanduser('~')`` (not ``os.environ['HOME']``)
      # handles the cron / restricted-launchd-context case where ``HOME``
      # is unset and resolves via the pwd database instead of crashing
      # with ``KeyError`` and a confusing traceback.
      - rm -f ~/Library/LaunchAgents/.com.lip.ollama.plist.next
      - >
        python3 -c "import os, sys, pathlib;
        src = pathlib.Path('infra/launchd/com.lip.ollama.plist.tmpl').read_text();
        sys.stdout.write(src.replace('__HOME__', os.path.expanduser('~')))" > ~/Library/LaunchAgents/.com.lip.ollama.plist.next
      - >
        if [ -f ~/Library/LaunchAgents/com.lip.ollama.plist ] &&
        ! cmp -s ~/Library/LaunchAgents/.com.lip.ollama.plist.next ~/Library/LaunchAgents/com.lip.ollama.plist;
        then echo "ollama:install — plist drift detected; overwriting (diff above)";
        diff -u ~/Library/LaunchAgents/com.lip.ollama.plist ~/Library/LaunchAgents/.com.lip.ollama.plist.next || true;
        fi
      - mv -f ~/Library/LaunchAgents/.com.lip.ollama.plist.next ~/Library/LaunchAgents/com.lip.ollama.plist
      # Idempotent re-load: bootout (tolerant of "not loaded" via `|| true`,
      # matches the symmetric ollama:uninstall pattern) then bootstrap. A
      # re-run of `task ollama:install` after a partial setup converges to
      # the loaded-state instead of failing with launchctl exit code 17
      # ("Service is already loaded").
      - launchctl bootout gui/$(id -u)/com.lip.ollama 2>/dev/null || true
      - launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.lip.ollama.plist

  ollama:uninstall:
    desc: Remove the Ollama launchd agent (boots out + deletes the installed plist)
    cmds:
      # `bootout` exits non-zero when the agent isn't loaded; tolerate that so
      # the task is idempotent and AC-10 ("exits 0") holds on a clean machine.
      - launchctl bootout gui/$(id -u)/com.lip.ollama || true
      - rm -f ~/Library/LaunchAgents/com.lip.ollama.plist

  ollama:status:
    desc: Report the launchctl state of the Ollama agent in the gui/$UID domain
    cmds:
      - launchctl print gui/$(id -u)/com.lip.ollama
