[importlinter]
root_package = app

# Architecture contracts for the LIP project.
#
# The "no direct imports from app.exceptions._generated" discipline is
# also enforced by app/exceptions/__init__.py's docstring and CLAUDE.md
# (Forbidden Patterns) — see the note further down for why a contract is
# unsuitable here.
#
# Layer-level forbidden contracts and feature-internal layering contracts
# for app.features.inference. Active layers: model/, schemas/, repository/.
# The full router -> service -> repository -> model chain will be locked
# once LIP-E001-F002 (router + service) lands; the feature-isolation
# contract below (`features-are-independent`) gets a second module entry
# when a second feature lands under app.features.

# Note: app.api can import from app.features because it includes feature
# routers; it is intentionally excluded from the leaf contracts below.
# The "core/exceptions/schemas cannot import features" rule is the
# features edge of the leaf contracts further down — listing it
# separately would duplicate the same edge.

# `_generated/` is an internal package; CLAUDE.md says non-`exceptions`
# code must import error classes through `app.exceptions`, not from the
# generated tree. Encode the rule mechanically so the next reviewer
# doesn't have to remember. The single legitimate path -
# `app.exceptions.__init__` re-exporting from `_generated/` - is
# allowlisted via ignore_imports.
[importlinter:contract:no-direct-generated-error-imports]
name = Generated error classes are imported only via app.exceptions
type = forbidden
source_modules =
    app.api
    app.core
    app.schemas
    app.features
forbidden_modules =
    app.exceptions._generated
ignore_imports =
    app.exceptions -> app.exceptions._generated._registry
    app.exceptions -> app.exceptions._generated

# Core stays a leaf — it should not depend on any other app layer. This
# is the "core_no_features" rule extended to all sibling layers so a
# future logging helper cannot accidentally couple core to api/ or
# exceptions/.
[importlinter:contract:core-is-leaf]
name = Core layer must not import other app layers
type = forbidden
source_modules =
    app.core
forbidden_modules =
    app.api
    app.exceptions
    app.features
    app.schemas

# Exceptions is also a leaf — DomainError + the generated subclasses are
# raised by features and rendered by app.api, so an import from
# exceptions back into api / schemas would invert the dependency direction
# and create a cycle. The "exceptions-no-features" contract above blocks
# the features edge; this contract closes the api/schemas edge.
[importlinter:contract:exceptions-is-leaf]
name = Exceptions layer must not import other app layers
type = forbidden
source_modules =
    app.exceptions
forbidden_modules =
    app.api
    app.features
    app.schemas

# Schemas is a leaf — wire-shape Pydantic models. Symmetric to core/ and
# exceptions/. A schema importing from app.api would couple wire shape to
# routing/handler concerns; a schema importing from app.exceptions would
# embed exception classes in the wire surface (the project convention is
# the inverse: app.api wires DomainError + ProblemDetails together).
[importlinter:contract:schemas-is-leaf]
name = Schemas layer must not import other app layers
type = forbidden
source_modules =
    app.schemas
forbidden_modules =
    app.api
    app.exceptions
    app.features

# Cross-feature isolation: every feature under app.features.* is independent
# and must not import another feature's modules. Today only `inference`
# exists — the `independence` contract is vacuously KEPT when there is one
# module (no pairs to check). When the second feature lands, append its
# top-level module here AND verify the contract reports KEPT (not vacuously
# empty) via `lint-imports -v`. CLAUDE.md "Forbidden Patterns" requires
# adding new feature slices to this file; that requirement includes adding
# the new module to this `modules =` list.
[importlinter:contract:features-are-independent]
name = Features cannot import each other
type = independence
modules =
    app.features.inference

# ── inference feature ──────────────────────────────────────────────
# Active layers under app.features.inference: model/, schemas/
# (LIP-E001-F001), repository/ (LIP-E003-F001 + LIP-E003-F002). The
# router -> service edge will land alongside LIP-E001-F002.
#
# CLAUDE.md "schemas may import value-objects from model/, models
# never import schemas" rule:
[importlinter:contract:inference-model-no-schemas]
name = inference: model layer cannot import from schemas layer
type = forbidden
source_modules =
    app.features.inference.model
forbidden_modules =
    app.features.inference.schemas

# Repository is the data-access boundary — for LIP it talks to Ollama,
# not a database. It must not depend on the wire-shape schemas above
# (which are response-envelope concerns owned by the service+router).
[importlinter:contract:inference-repository-no-schemas]
name = inference: repository layer cannot import from schemas layer
type = forbidden
source_modules =
    app.features.inference.repository
forbidden_modules =
    app.features.inference.schemas

# Layer direction rule: repository -> model is permitted (LIP-E003-F002
# made this edge load-bearing — OllamaClient.chat returns OllamaChatResult
# from model/, and ollama_translation.py imports it). The inverse
# direction (model -> repository) would invert the layering: value
# objects must not know about the data-access boundary.
[importlinter:contract:inference-model-no-repository]
name = inference: model layer cannot import from repository layer
type = forbidden
source_modules =
    app.features.inference.model
forbidden_modules =
    app.features.inference.repository

# Wire-schema closure: schemas may import value-objects from model/ but
# must not reach into repository/ (which carries httpx-bearing classes).
# Mirrors the existing inference-repository-no-schemas contract on the
# other axis.
[importlinter:contract:inference-schemas-no-repository]
name = inference: schemas layer cannot import from repository layer
type = forbidden
source_modules =
    app.features.inference.schemas
forbidden_modules =
    app.features.inference.repository

# The global error-handler is feature-agnostic by contract — it renders
# DomainError + ProblemDetails, never feature-specific shapes. A drift
# where exception_handlers.py reaches into a feature's schemas/models
# would couple the error path to that feature.
[importlinter:contract:api-exception-handlers-feature-agnostic]
name = api.exception_handlers must not import from features
type = forbidden
source_modules =
    app.api.exception_handlers
forbidden_modules =
    app.features

# Note: a "main-no-features" contract is intentionally NOT declared.
# main.py's transitive import graph legitimately reaches features through
# app.api.deps (get_ollama_client) and app.api.router_registry
# (lifespan_resources). import-linter "forbidden" contracts include
# transitive imports, so a contract forbidding main -> features would
# require allowlisting every legitimate transitive path through app.api,
# which is high-maintenance and inverts the discipline from "main never
# directly imports features" (the actual intent) to "main can never
# transitively reach features" (which is impossible by design).
# router_registry.py:1-6 documents the convention; rely on code review.
