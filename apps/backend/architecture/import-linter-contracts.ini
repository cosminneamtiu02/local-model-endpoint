[importlinter]
root_package = app

# Architecture contracts for the LIP project.
#
# The "no direct imports from app.exceptions._generated" discipline is
# also enforced by app/exceptions/__init__.py's docstring and CLAUDE.md
# (Forbidden Patterns) — see the note further down for why a contract is
# unsuitable here.
#
# Layer-level forbidden contracts and feature-internal layering contracts
# for app.features.inference. Active layers: model/, schemas/, repository/.
# The full router -> service -> repository -> model chain will be locked
# once LIP-E001-F002 (router + service) lands; the feature-isolation
# contract below (`features-are-independent`) gets a second module entry
# when a second feature lands under app.features.

# Note: app.api can import from app.features because it includes feature
# routers; it is intentionally excluded from the leaf contracts below.
# The "core/exceptions/schemas cannot import features" rule is the
# features edge of the leaf contracts further down — listing it
# separately would duplicate the same edge.

# `_generated/` is an internal package; CLAUDE.md says non-`exceptions`
# code must import error classes through `app.exceptions`, not from the
# generated tree. Encode the rule mechanically so the next reviewer
# doesn't have to remember. The single legitimate path -
# `app.exceptions.__init__` re-exporting from `_generated/` - is
# allowlisted via ignore_imports.
[importlinter:contract:no-direct-generated-error-imports]
name = Generated error classes are imported only via app.exceptions
type = forbidden
source_modules =
    app.api
    app.core
    app.schemas
    app.features
forbidden_modules =
    app.exceptions._generated
ignore_imports =
    app.exceptions -> app.exceptions._generated._registry
    app.exceptions -> app.exceptions._generated

# Core stays a leaf — it should not depend on any other app layer. This
# is the "core_no_features" rule extended to all sibling layers so a
# future logging helper cannot accidentally couple core to api/ or
# exceptions/.
[importlinter:contract:core-is-leaf]
name = Core layer must not import other app layers
type = forbidden
source_modules =
    app.core
forbidden_modules =
    app.api
    app.exceptions
    app.features
    app.schemas

# Exceptions is also a leaf — DomainError + the generated subclasses are
# raised by features and rendered by app.api, so an import from
# exceptions back into api / schemas would invert the dependency direction
# and create a cycle. The "exceptions-no-features" contract above blocks
# the features edge; this contract closes the api/schemas/core edges.
# ``app.core`` is forbidden symmetric with ``core-is-leaf`` below — coupling
# the DomainError hierarchy to runtime config (e.g. a Settings-aware error
# class) bakes startup-time concerns into the error contract.
[importlinter:contract:exceptions-is-leaf]
name = Exceptions layer must not import other app layers
type = forbidden
source_modules =
    app.exceptions
forbidden_modules =
    app.api
    app.core
    app.features
    app.schemas

# Schemas is a leaf — wire-shape Pydantic models. Symmetric to core/ and
# exceptions/. A schema importing from app.api would couple wire shape to
# routing/handler concerns; a schema importing from app.exceptions would
# embed exception classes in the wire surface (the project convention is
# the inverse: app.api wires DomainError + ProblemDetails together).
# ``app.core`` is forbidden too — symmetric with the per-feature
# ``inference-schemas-cross-layer`` contract below ("coupling a wire shape
# to runtime config inverts the intended dependency direction"); a future
# ``Settings``-aware schema field would land in two places without this
# rule, defeating the leaf invariant.
[importlinter:contract:schemas-is-leaf]
name = Schemas layer must not import other app layers
type = forbidden
source_modules =
    app.schemas
forbidden_modules =
    app.api
    app.core
    app.exceptions
    app.features

# Cross-feature isolation: every feature under app.features.* is independent
# and must not import another feature's modules. Today only `inference`
# exists — the `independence` contract is vacuously KEPT when there is one
# module (no pairs to check). When the second feature lands, append its
# top-level module here AND verify the contract reports KEPT (not vacuously
# empty) via `lint-imports -v`. CLAUDE.md "Forbidden Patterns" requires
# adding new feature slices to this file; that requirement includes adding
# the new module to this `modules =` list.
[importlinter:contract:features-are-independent]
name = Features cannot import each other
type = independence
modules =
    app.features.inference

# ── inference feature ──────────────────────────────────────────────
# Active layers under app.features.inference: model/, schemas/
# (LIP-E001-F001), repository/ (LIP-E003-F001 + LIP-E003-F002). The
# router -> service edge will land alongside LIP-E001-F002.
#
# CLAUDE.md "schemas may import value-objects from model/, models
# never import schemas" rule:
[importlinter:contract:inference-model-no-schemas]
name = inference: model layer cannot import from schemas layer
type = forbidden
source_modules =
    app.features.inference.model
forbidden_modules =
    app.features.inference.schemas

# Repository is the data-access boundary — for LIP it talks to Ollama,
# not a database. It must not depend on the wire-shape schemas above
# (which are response-envelope concerns owned by the service+router).
[importlinter:contract:inference-repository-no-schemas]
name = inference: repository layer cannot import from schemas layer
type = forbidden
source_modules =
    app.features.inference.repository
forbidden_modules =
    app.features.inference.schemas

# Layer direction rule: repository -> model is permitted (LIP-E003-F002
# made this edge load-bearing — OllamaClient.chat returns OllamaChatResult
# from model/, and the framework-free ollama_translation helpers — also
# under model/ — assemble that value-object). The inverse direction
# (model -> repository) is forbidden but is folded into the single
# ``inference-model-is-leaf`` contract below — see its comment block for
# the rationale.

# Wire-schema closure: schemas may import value-objects from model/ but
# must not reach into repository/ (which carries httpx-bearing classes).
# Mirrors the existing inference-repository-no-schemas contract on the
# other axis.
[importlinter:contract:inference-schemas-no-repository]
name = inference: schemas layer cannot import from repository layer
type = forbidden
source_modules =
    app.features.inference.schemas
forbidden_modules =
    app.features.inference.repository

# Cross-app-layer leaf rule for schemas: feature schemas are wire-only
# Pydantic shapes. They legitimately reach app.schemas for shared wire
# constants (e.g. UUID_PATTERN_STR), but must not reach app.api (handler
# wiring concern), app.core (Settings/logging — coupling a wire shape to
# runtime config inverts the intended dependency direction), or
# app.exceptions (a typed @model_validator raising a DomainError would
# skip the FastAPI handler chain that owns DomainError -> RFC 7807
# conversion). The right answer for validation failures is `raise
# ValueError(...)` -> ``RequestValidationError`` -> handler.
[importlinter:contract:inference-schemas-cross-layer]
name = inference: schemas layer cannot reach into app.api / app.core / app.exceptions
type = forbidden
source_modules =
    app.features.inference.schemas
forbidden_modules =
    app.api
    app.core
    app.exceptions

# Cross-app-layer leaf rule for repository: legitimately imports
# app.core (EXC_MESSAGE_PREVIEW_MAX_CHARS) and the failure-mapping layer
# (LIP-E003-F003) will eventually import app.exceptions to raise typed
# DomainError. Until then, repository must not reach app.api (would
# invert the dependency direction) and must not reach the wire schemas
# (response-envelope concerns owned by the service+router).
# app.exceptions is intentionally NOT in the forbidden list today —
# LIP-E003-F003 will lift the in-line exception raises into a separate
# failure-mapping module that imports app.exceptions; adding it here now
# would block that planned work.
[importlinter:contract:inference-repository-cross-layer]
name = inference: repository layer cannot reach into app.api or feature schemas
type = forbidden
source_modules =
    app.features.inference.repository
forbidden_modules =
    app.api
    app.features.inference.schemas

# Layer direction rule: ``model/`` is the deepest layer per CLAUDE.md
# "router -> service -> repository -> model. No skipping." Forbid model
# from importing app.api / app.core / app.exceptions / app.schemas so
# a future model file that reaches up to raise a typed error from a
# @model_validator (a tempting shortcut) inverts the layering and
# trips the contract instead of slipping in. The same-feature
# repository edge (``app.features.inference.repository``) is included in
# this single forbidden_modules block — folding the previous
# ``inference-model-no-repository`` contract here keeps the model layer's
# full forbidden set in one place rather than spread across two contracts
# (matches the leaf-pattern used by ``core-is-leaf``, ``exceptions-is-leaf``,
# ``schemas-is-leaf``).
[importlinter:contract:inference-model-is-leaf]
name = inference: model layer must not import other app layers
type = forbidden
source_modules =
    app.features.inference.model
forbidden_modules =
    app.api
    app.core
    app.exceptions
    app.schemas
    app.features.inference.repository

# The global error-handler is feature-agnostic by contract — it renders
# DomainError + ProblemDetails, never feature-specific shapes. A drift
# where exception_handler_registry.py reaches into a feature's schemas/models
# would couple the error path to that feature.
[importlinter:contract:api-exception-handlers-feature-agnostic]
name = api.exception_handler_registry must not import from features
type = forbidden
source_modules =
    app.api.exception_handler_registry
forbidden_modules =
    app.features

# Symmetric to the exception-handlers contract above — RequestIdMiddleware
# is feature-agnostic by design (request-id stamping, access log, body-
# size guard). A drift where the middleware sniffs a feature-specific
# header would couple the request entry point to that feature.
[importlinter:contract:api-request-id-middleware-feature-agnostic]
name = api.request_id_middleware must not import from features
type = forbidden
source_modules =
    app.api.request_id_middleware
forbidden_modules =
    app.features

# Note: ``app.api.app_state`` is intentionally NOT subjected to a per-
# module ``feature-agnostic`` contract (mirroring the
# ``exception_handler_registry``/``request_id_middleware`` pair). AppState
# legitimately carries an ``OllamaClient`` field, which means a per-
# module forbid would have to exempt that exact transitive path — work
# the broader ``api-uses-inference-feature-root`` contract below already
# does for the entire ``app.api`` package. That contract restricts
# ``app.api`` (including ``app.api.app_state``) to importing inference
# internals only via the feature root (``app.features.inference``), which
# is the exact protection the per-module pin would have added; the
# narrower contract would be redundant and reject the OllamaClient field
# transitively. ``router_registry`` is similarly covered.

# Defense-in-depth: app.api consumers should reach into the inference
# feature via the feature root (`app.features.inference`), not directly
# into `app.features.inference.repository`. The feature root re-exports
# the swap-point classes so a future backend rotation (vLLM/MLX) re-binds
# the public name once at the root instead of requiring per-call-site
# renames in app.api.
[importlinter:contract:api-uses-inference-feature-root]
name = api consumers must not reach into inference internals
type = forbidden
source_modules =
    app.api
forbidden_modules =
    app.features.inference.repository
    app.features.inference.model
    app.features.inference.schemas
ignore_imports =
    app.features.inference -> app.features.inference.repository

# Note: a "main-no-features" contract is intentionally NOT declared.
# main.py's transitive import graph legitimately reaches features through
# app.api.deps (get_ollama_client) and app.api.router_registry
# (lifespan_resources). import-linter "forbidden" contracts include
# transitive imports, so a contract forbidding main -> features would
# require allowlisting every legitimate transitive path through app.api,
# which is high-maintenance and inverts the discipline from "main never
# directly imports features" (the actual intent) to "main can never
# transitively reach features" (which is impossible by design).
# router_registry.py:1-6 documents the convention; rely on code review.
