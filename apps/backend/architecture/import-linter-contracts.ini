[importlinter]
root_package = app

# Architecture contracts for the LIP project.
#
# Layer-level forbidden contracts that work even before the LIP feature
# is scaffolded under app.features. Feature-internal layering contracts
# (router -> service -> repository -> model) and feature-isolation
# contracts (features can't import each other) are added during
# feature-dev when the LIP feature lands.
#
# Currently active features under app.features:
#   - inference (LIP-E003-F001 ships repository/ollama_client.py)
# Layered contracts (router -> service -> repository -> model) are
# added when sibling layers land in LIP-E001-F002 (orchestration) and
# LIP-E003-F002 (typed adapter methods); feature-isolation contracts
# get a forbidden_modules entry when a second feature lands.

[importlinter:contract:core-no-features]
name = Core layer cannot import from features
type = forbidden
source_modules =
    app.core
forbidden_modules =
    app.features

[importlinter:contract:exceptions-no-features]
name = Exceptions cannot import from features
type = forbidden
source_modules =
    app.exceptions
forbidden_modules =
    app.features

[importlinter:contract:schemas-no-features]
name = Schemas cannot import from features
type = forbidden
source_modules =
    app.schemas
forbidden_modules =
    app.features

# Note: app.api can import from app.features because it includes feature
# routers; it is intentionally excluded from the forbidden list above.
#
# Note: We don't use a generated-exceptions-isolation contract because
# import-linter traces transitive imports. The discipline is enforced by
# CLAUDE.md: "Never import from exceptions._generated directly."
