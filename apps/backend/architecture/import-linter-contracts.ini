[importlinter]
root_package = app

# Architecture contracts for the LIP project.
#
# Layer-level forbidden contracts that work even before the LIP feature
# is scaffolded under app.features. Feature-internal layering contracts
# for app.features.inference start landing with LIP-E001-F001
# (model/schemas only); the full router -> service -> repository -> model
# chain is filled in as the remaining inference features land.

[importlinter:contract:core-no-features]
name = Core layer cannot import from features
type = forbidden
source_modules =
    app.core
forbidden_modules =
    app.features

[importlinter:contract:exceptions-no-features]
name = Exceptions cannot import from features
type = forbidden
source_modules =
    app.exceptions
forbidden_modules =
    app.features

[importlinter:contract:schemas-no-features]
name = Schemas cannot import from features
type = forbidden
source_modules =
    app.schemas
forbidden_modules =
    app.features

# Note: app.api can import from app.features because it includes feature
# routers; it is intentionally excluded from the forbidden list above.
#
# Note: We don't use a generated-exceptions-isolation contract because
# import-linter traces transitive imports. The discipline is enforced by
# CLAUDE.md: "Never import from exceptions._generated directly."

# ── inference feature ──────────────────────────────────────────────
# F001 ships only model/ and schemas/. The CLAUDE.md "schemas may
# import value-objects from model/, models never import schemas" rule
# is enforced here; the inverse direction is forbidden.
[importlinter:contract:inference-model-no-schemas]
name = inference: model layer cannot import from schemas layer
type = forbidden
source_modules =
    app.features.inference.model
forbidden_modules =
    app.features.inference.schemas
