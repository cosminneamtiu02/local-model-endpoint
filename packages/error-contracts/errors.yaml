version: 1

errors:
  # Generic errors (apply across domains)
  NOT_FOUND:
    http_status: 404
    description: Requested resource does not exist
    params: {}

  CONFLICT:
    http_status: 409
    description: Operation conflicts with current state
    params: {}

  VALIDATION_FAILED:
    http_status: 422
    description: Request payload failed validation
    params:
      field: string
      reason: string

  INTERNAL_ERROR:
    http_status: 500
    description: Unhandled server error; details are logged with request_id
    params: {}

  RATE_LIMITED:
    http_status: 429
    description: Client exceeded rate limit
    params:
      retry_after_seconds: integer

# LIP-specific error codes will be added here during feature-dev. See
# graphs/LIP/ for the planned codes:
#   - QUEUE_FULL          (HTTP 503, LIP-E004-F002)
#   - INFERENCE_TIMEOUT   (HTTP 504, LIP-E004-F003)
#   - ADAPTER_CONNECTION_FAILURE  (HTTP 502, LIP-E003-F003)
#   - REGISTRY_NOT_FOUND  (HTTP 404, LIP-E002-F001)
