version: 1

# RFC 7807 (https://datatracker.ietf.org/doc/html/rfc7807) shape:
#   title           — short human-readable summary (RFC 7807 §3.1)
#   detail_template — per-instance message; substituted via str.format(**params)
#   params          — typed parameter object (Pydantic model); spread at root in
#                     responses per RFC 7807 extension convention.
#
# type_uri (urn:lip:error:<kebab-code>) is derived in codegen, not declared here.
#
# ──────────────────────────────────────────────────────────────────────────────
# Code naming → class naming
# ──────────────────────────────────────────────────────────────────────────────
# Codes here are SCREAMING_SNAKE_CASE strings. The codegen
# (``packages/error-contracts/scripts/generate.py:_code_to_class_name``)
# converts each code to PascalCase for the generated Python exception class:
#
#   1. Lower-case the code, split on underscores, capitalize each word, join.
#      ``ADAPTER_CONNECTION_FAILURE`` -> ``AdapterConnectionFailure``
#      ``INTERNAL_ERROR``             -> ``InternalError``
#      ``METHOD_NOT_ALLOWED``         -> ``MethodNotAllowed``
#   2. If the resulting PascalCase name does NOT already end with ``Error``,
#      append ``Error``. If it DOES end with ``Error`` (because the code
#      itself ended in ``_ERROR``), the suffix is left as-is — no double-
#      ``ErrorError`` and no asymmetric stripping. Worked examples:
#        - ``ADAPTER_CONNECTION_FAILURE`` -> ``AdapterConnectionFailureError``
#        - ``INTERNAL_ERROR``             -> ``InternalError`` (not InternalErrorError)
#        - ``METHOD_NOT_ALLOWED``         -> ``MethodNotAllowedError``
#
# Practical guidance: prefer codes that DO NOT end in ``_ERROR`` so the
# generated class name reads naturally with the appended ``Error`` suffix.
# Reserve ``_ERROR``-suffixed codes for cases where the unsuffixed form
# would read awkwardly (``INTERNAL`` -> ``InternalError`` is the canonical
# example).
# ──────────────────────────────────────────────────────────────────────────────

errors:
  # ── Generic codes (apply across domains) ─────────────────────────────────
  NOT_FOUND:
    http_status: 404
    description: Requested resource does not exist
    title: Resource Not Found
    detail_template: The requested resource does not exist.
    params: {}

  CONFLICT:
    http_status: 409
    description: Operation conflicts with current state
    title: Conflict
    detail_template: The operation conflicts with the current resource state.
    params: {}

  VALIDATION_FAILED:
    http_status: 422
    description: Request payload failed validation
    title: Validation Failed
    detail_template: "Validation failed for field '{field}': {reason}"
    params:
      field: string
      reason: string

  INTERNAL_ERROR:
    http_status: 500
    description: Unhandled server error; details are logged with request_id
    title: Internal Server Error
    detail_template: An unexpected error occurred. Use the request_id to correlate with server logs.
    params: {}

  METHOD_NOT_ALLOWED:
    http_status: 405
    description: Request used an HTTP method the route does not accept
    title: Method Not Allowed
    detail_template: The HTTP method used is not allowed for this route.
    params: {}

  RATE_LIMITED:
    http_status: 429
    description: Client exceeded rate limit
    title: Too Many Requests
    detail_template: "Rate limit exceeded. Retry after {retry_after_seconds} seconds."
    params:
      retry_after_seconds: integer

  # ── LIP-specific codes (LIP-E004-F004) ───────────────────────────────────
  QUEUE_FULL:
    http_status: 503
    description: Inference queue at capacity, request rejected (LIP-E004-F002)
    title: Inference Queue Full
    detail_template: "Inference queue at capacity ({current_waiters} waiters, max {max_waiters})."
    params:
      max_waiters: integer
      current_waiters: integer

  INFERENCE_TIMEOUT:
    http_status: 504
    description: Inference exceeded the per-request timeout (LIP-E004-F003)
    title: Inference Timeout
    detail_template: "Inference exceeded the {timeout_seconds}-second timeout."
    params:
      timeout_seconds: integer

  ADAPTER_CONNECTION_FAILURE:
    http_status: 502
    description: Adapter (e.g. Ollama) connection or response failure (LIP-E003-F003)
    title: Adapter Connection Failure
    detail_template: "Inference backend '{backend}' failed: {reason}"
    params:
      backend: string
      reason: string

  REGISTRY_NOT_FOUND:
    http_status: 404
    description: Logical model name not present in the model registry (LIP-E002-F001)
    title: Model Not Found in Registry
    detail_template: "Model '{model_name}' is not registered with this provider."
    params:
      model_name: string

  MODEL_CAPABILITY_NOT_SUPPORTED:
    http_status: 422
    description: Request requires a capability the model does not advertise (LIP-E001-F002)
    title: Model Capability Not Supported
    detail_template: "Model '{model_name}' does not support requested capability '{requested_capability}'."
    params:
      model_name: string
      requested_capability: string
