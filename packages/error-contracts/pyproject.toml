[project]
name = "error-contracts"
version = "0.1.0"
description = "YAML error-code definitions and Python codegen for the LIP error system; produces apps/backend/app/exceptions/_generated/ via `task errors:generate`. Not installable as a runtime library — no wheel build target."
license = "MIT"
authors = [{ name = "Cosmin Neamtiu" }]
requires-python = ">=3.13,<3.14"
dependencies = [
    "pyyaml==6.0.3",
]

[dependency-groups]
dev = [
    "pytest==9.0.3",
    # pytest-asyncio not needed — codegen tests are sync.
    "ruff==0.15.12",
    "pyright==1.1.409",
    # pip-audit mirrors the backend's CVE scan via ``task check:audit:errors``
    # so both workspaces share the same gating shape.
    "pip-audit==2.10.0",
    # pytest-cov mirrors the backend's coverage gate via
    # ``task check:coverage:errors`` so the codegen module — the
    # source-of-truth enforcer for errors.yaml invariants — carries a
    # coverage floor symmetric with the backend it generates code for.
    "pytest-cov==7.1.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "-q",
    "-ra",
    "--strict-markers",
    "--strict-config",
]
# An xfail that unexpectedly passes is a hard failure (forces the author
# to remove the marker rather than leaving stale xfails in the suite). See
# ``apps/backend/pyproject.toml`` for the full rationale; the same
# discipline applies to both workspaces.
xfail_strict = true
# Bare ``["error"]`` suffices because this workspace has no async tests;
# if any are added, copy the apps/backend filter list to handle anyio
# teardown ResourceWarnings.
filterwarnings = ["error"]
# Mirror the apps/backend pinning so this workspace's discovery rules
# match the rest of the monorepo. Without these pins, pytest's defaults
# allow ``*_test.py`` filenames which would let a contributor land a
# misnamed test silently.
# Suppresses class-based collection silently; the loud-fail backstop is
# the ``pytest_sessionstart`` hook in ``tests/conftest.py`` (the literal
# class name ``NoTestClassesAllowed`` is a sentinel no realistic test
# author writes). See ``apps/backend/pyproject.toml`` for the same pin.
python_classes = ["NoTestClassesAllowed"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["scripts"]
branch = true
omit = ["**/__init__.py"]

[tool.coverage.report]
# Establish a coverage gate symmetric with the backend's. Measured
# baseline at 2026-05-05 is 86% — set the floor 6pt below to leave
# room for transient regressions without flapping the gate during
# feature-dev. Round-19 follow-up: walk the uncovered branches in
# ``generate.py`` (mostly defensive-error arms inside the YAML
# parser) and either add tests or pragma:no-cover them, then bump
# the gate to 90% in lockstep with the backend.
fail_under = 80
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.\\s*$",
    "if __name__ == .__main__.:",
]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "strict"
include = ["scripts", "tests"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",
    "ANN401",
    "COM812",
    "ISC001",
    "FIX002",
    "TD003",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN", "ARG001", "PLR2004", "PLC0415", "E501", "SLF001", "PT012", "EM101"]
