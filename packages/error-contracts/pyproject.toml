[project]
name = "error-contracts"
version = "0.1.0"
description = "YAML error-code definitions and Python codegen for the LIP error system; produces apps/backend/app/exceptions/_generated/ via `task errors:generate`. Not installable as a runtime library — no wheel build target."
license = "MIT"
authors = [{ name = "Cosmin Neamtiu" }]
# Lockstep with ``apps/backend/pyproject.toml`` — bump together when
# Python 3.14 lands and is validated against the codegen tests. ``uv
# lock`` normalizes this range to ``==3.13.*`` in ``uv.lock``; the two
# expressions are PEP 440 equivalents.
requires-python = ">=3.13,<3.14"
# This workspace has no runtime surface (description above states "not
# installable as a runtime library — no wheel build target"). Every
# pyyaml consumer is in ``scripts/`` (codegen) or ``tests/`` — both
# dev-time. Symmetric with the backend's classification (pyyaml is dev-
# only there too because the backend has no runtime YAML need either).
dependencies = []

[dependency-groups]
dev = [
    "pytest==9.0.3",
    # pytest-asyncio not needed — codegen tests are sync. If a future
    # contributor adds the FIRST async test to this workspace, also pin
    # ``pytest-asyncio==<same-version-as-apps/backend>`` here AND set
    # ``asyncio_mode = "auto"`` in [tool.pytest.ini_options] below in
    # lockstep with the apps/backend pin. The cross-workspace version
    # alignment is the contract; the
    # ``test_pytest_config_drift_guard.py`` self-test in this
    # workspace's tests pins the deliberate omission so the contributor
    # adding async tests sees a red bar guiding the lockstep edit.

    "ruff==0.15.12",
    "pyright==1.1.409",
    # pip-audit mirrors the backend's CVE scan via ``task check:audit:errors``
    # so both workspaces share the same gating shape.
    "pip-audit==2.10.0",
    # pytest-cov mirrors the backend's coverage gate via
    # ``task check:coverage:errors`` so the codegen module — the
    # source-of-truth enforcer for errors.yaml invariants — carries a
    # coverage floor symmetric with the backend it generates code for.
    "pytest-cov==7.1.0",
    # pyyaml is dev-only here: the codegen and the YAML-invariants tests
    # are the ONLY consumers; this workspace has no runtime surface.
    "pyyaml==6.0.3",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "-q",
    "-ra",
    "--strict-markers",
    "--strict-config",
]
# An xfail that unexpectedly passes is a hard failure (forces the author
# to remove the marker rather than leaving stale xfails in the suite). See
# ``apps/backend/pyproject.toml`` for the full rationale; the same
# discipline applies to both workspaces.
xfail_strict = true
# Bare ``["error"]`` suffices because this workspace has no async tests;
# if any are added, copy the apps/backend filter list to handle anyio
# teardown ResourceWarnings.
filterwarnings = ["error"]
# Mirror the apps/backend pinning so this workspace's discovery rules
# match the rest of the monorepo. Without these pins, pytest's defaults
# allow ``*_test.py`` filenames which would let a contributor land a
# misnamed test silently.
# Suppresses class-based collection silently; the loud-fail backstop is
# the ``pytest_sessionstart`` hook in ``tests/conftest.py`` (the literal
# class name ``NoTestClassesAllowed`` is a sentinel no realistic test
# author writes). See ``apps/backend/pyproject.toml`` for the same pin.
python_classes = ["NoTestClassesAllowed"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["scripts"]
branch = true
omit = ["**/__init__.py"]

[tool.coverage.report]
# Establish a coverage gate symmetric with the backend's. Floor is set
# below the measured baseline (~88%) to leave room for transient
# regressions without flapping during feature-dev. Follow-up: walk
# the uncovered branches in ``generate.py`` (mostly defensive-error
# arms inside the YAML parser) and either add tests or pragma:no-cover
# them, then bump the gate to 90% in lockstep with the backend.
fail_under = 80
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.\\s*$",
    "if __name__ == .__main__.:",
]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "strict"
include = ["scripts", "tests"]
# Mirror pytest's ``pythonpath = ["."]`` so pyright can resolve
# ``from scripts.generate import ...`` and ``from tests.conftest import
# ...`` the same way the test runner does. Without this, the strict-mode
# add-ons below (notably ``reportUnnecessaryTypeIgnoreComment``) fire on
# false-positive ``reportMissingImports`` chains because pyright walks
# the include tree but cannot resolve the ``scripts.`` / ``tests.``
# package roots.
extraPaths = ["."]
# Mirror the apps/backend strict-mode add-ons so the codegen workspace
# carries the same upgrade-rot / @override / uninitialized-instance-var
# guards the backend depends on. See apps/backend/pyproject.toml lines
# 251-282 for the rationale block; the same logic applies symmetrically
# here because this workspace's generator emits backend's
# hand-untouchable code.
reportUnnecessaryTypeIgnoreComment = "error"
reportImplicitOverride = "error"
reportUninitializedInstanceVariable = "error"

[[tool.pyright.executionEnvironments]]
# Per-tree relaxations for ``tests/`` — mirrors the apps/backend block
# at apps/backend/pyproject.toml:285-300. ``reportPrivateUsage`` is
# silenced here so tests that legitimately reach into single-underscore
# helpers (e.g. ``_TEST_CLASS_PATTERN``) do not need per-line
# ``# pyright: ignore[reportPrivateUsage]`` suppressions; the strict-
# mode flags above remain enforced on the test tree.
root = "tests"
reportPrivateUsage = "none"
reportUnusedFunction = "none"
reportUnusedClass = "none"
reportUnknownVariableType = "none"
reportUnknownMemberType = "none"
reportUnknownArgumentType = "none"

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",
    "ANN401",
    "COM812",
    "ISC001",
    "FIX002",
    "TD003",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN", "ARG001", "PLR2004", "PLC0415", "E501", "SLF001", "PT012", "EM101"]
