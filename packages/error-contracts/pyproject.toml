[project]
name = "error-contracts"
version = "0.1.0"
description = "Error code definitions and Python codegen for the LIP error system"
requires-python = ">=3.13,<3.14"
dependencies = [
    "pyyaml==6.0.3",
]

[dependency-groups]
dev = [
    "pytest==9.0.3",
    "pytest-cov==7.1.0",
    "ruff==0.15.12",
    "pyright==1.1.409",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "-q",
    "-ra",
    "--strict-markers",
    "--strict-config",
]
xfail_strict = true
filterwarnings = ["error"]
python_classes = ["NoTestClassesAllowed"]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "strict"
include = ["scripts", "tests"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",
    "ANN401",
    "COM812",
    "ISC001",
    "FIX002",
    "TD003",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN", "ARG001", "PLR2004", "PLC0415", "E501", "SLF001", "PT012", "EM101"]

[tool.coverage.run]
source = ["scripts"]

[tool.coverage.report]
fail_under = 90
