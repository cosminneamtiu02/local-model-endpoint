[project]
name = "error-contracts"
version = "0.1.0"
description = "Error code definitions and Python codegen for the LIP error system"
requires-python = ">=3.13,<3.14"
dependencies = [
    "pyyaml==6.0.3",
]

[dependency-groups]
# pytest-cov is intentionally retained: this workspace's `[tool.pytest.ini_options]`
# below leaves coverage off the default invocation, but the codegen
# tests use ``--cov=scripts --cov-fail-under=90`` when invoked through
# ``task check:coverage`` (mirror of the apps/backend pattern). Removing
# pytest-cov would break that gate; keeping the explicit dep flags it
# as load-bearing for the next dep audit.
dev = [
    "pytest==9.0.3",
    "pytest-cov==7.1.0",
    "ruff==0.15.12",
    "pyright==1.1.409",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "-q",
    "-ra",
    "--strict-markers",
    "--strict-config",
]
xfail_strict = true
filterwarnings = ["error"]
# Mirror the apps/backend pinning so this workspace's discovery rules
# match the rest of the monorepo. Without these pins, pytest's defaults
# allow ``*_test.py`` filenames which would let a contributor land a
# misnamed test silently.
python_classes = ["NoTestClassesAllowed"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "strict"
include = ["scripts", "tests"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",
    "ANN401",
    "COM812",
    "ISC001",
    "FIX002",
    "TD003",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN", "ARG001", "PLR2004", "PLC0415", "E501", "SLF001", "PT012", "EM101"]

[tool.coverage.run]
source = ["scripts"]

[tool.coverage.report]
fail_under = 90
